<html lang="it">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>SparkPlay</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Quicksand:wght@600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0b1228;
  --bg2:#141d3d;
  --card:#1c2548;
  --card2:#24305d;
  --pink:#ff5e6c;
  --pink-dark:#cf4450;
  --yellow:#ffe66d;
  --cyan:#4be7ff;
  --green:#6ee7b7;
  --white:#f7fff7;
  --muted:rgba(255,255,255,.74);
  --muted2:rgba(255,255,255,.56);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  margin:0;
  font-family:'Quicksand',sans-serif;
  color:var(--white);
  overflow:hidden;
  background:
    radial-gradient(circle at 50% 18%, rgba(75,231,255,.13), transparent 28%),
    radial-gradient(circle at 20% 85%, rgba(255,230,109,.10), transparent 24%),
    linear-gradient(180deg, #0c1531 0%, var(--bg) 100%);
}
body::before{
  content:"";
  position:fixed; inset:0; pointer-events:none;
  background-image:
    radial-gradient(circle at 12% 24%, rgba(255,255,255,.16) 0 1px, transparent 1px),
    radial-gradient(circle at 74% 21%, rgba(255,255,255,.10) 0 1px, transparent 1px),
    radial-gradient(circle at 41% 80%, rgba(255,255,255,.09) 0 1px, transparent 1px),
    radial-gradient(circle at 83% 71%, rgba(255,255,255,.10) 0 1px, transparent 1px);
  background-size:180px 180px, 220px 220px, 260px 260px, 240px 240px;
  opacity:.6;
}
.app{
  max-width:560px;
  margin:0 auto;
  height:100vh;
  display:flex;
  flex-direction:column;
  padding:env(safe-area-inset-top) 18px env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
}
.top{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:12px 16px 8px;
}
.brand{
  font-family:'Fredoka One',cursive;
  font-size:32px;
  color:var(--yellow);
  text-shadow:3px 3px 0 var(--pink);
  letter-spacing:.5px;
}
.ghost-btn,.danger-btn,.primary-btn,.secondary-btn,.icon-btn{
  border:none;
  border-radius:22px;
  font-family:'Fredoka One',cursive;
  cursor:pointer;
  transition:.18s ease;
}
.ghost-btn:active,.danger-btn:active,.primary-btn:active,.secondary-btn:active,.icon-btn:active{
  transform:translateY(2px) scale(.99);
}
.ghost-btn,.icon-btn{
  background:rgba(255,255,255,.08);
  color:white;
  padding:12px 14px;
}
.danger-btn{
  background:var(--pink);
  color:white;
  padding:14px 16px;
}
.primary-btn{
  background:linear-gradient(180deg,#ff6f7c 0%, var(--pink) 100%);
  color:white;
  padding:18px;
  width:100%;
  font-size:18px;
  box-shadow:0 8px 0 var(--pink-dark);
}
.primary-btn:active{
  transform:translateY(4px);
  box-shadow:0 3px 0 var(--pink-dark);
}
.secondary-btn{
  background:linear-gradient(180deg, rgba(75,231,255,.22), rgba(75,231,255,.10));
  color:white;
  border:2px solid rgba(75,231,255,.24);
  padding:18px;
  width:100%;
  font-size:16px;
}
.disabled{
  opacity:.45;
  cursor:not-allowed;
}
.content{
  flex:1;
  display:flex;
  flex-direction:column;
  justify-content:center;
  gap:16px;
  padding:0 16px 18px;
}
.card{
  background:linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.05));
  border:1px solid rgba(255,255,255,.06);
  border-radius:28px;
  padding:18px;
  box-shadow:0 14px 34px rgba(0,0,0,.30);
  backdrop-filter:blur(10px);
}
.center{text-align:center}
.hero-orbit{
  width:210px;height:210px;margin:0 auto 6px;position:relative;
  display:flex;align-items:center;justify-content:center;
}
.hero-core{
  width:66px;height:66px;border-radius:50%;
  background:radial-gradient(circle at 50% 50%, #fff 0%, #f8f0be 40%, #fff 100%);
  box-shadow:0 0 34px rgba(255,230,109,.55);
  display:flex;align-items:center;justify-content:center;font-size:28px;
}
.orbit-item{
  position:absolute;
  font-size:44px;
  animation:orbit 9s linear infinite;
}
.orbit-1{animation-delay:0s}
.orbit-2{animation-delay:-3s}
.orbit-3{animation-delay:-6s}
@keyframes orbit{
  from{transform:rotate(0deg) translateX(72px) rotate(0deg)}
  to{transform:rotate(360deg) translateX(72px) rotate(-360deg)}
}
.hero-title{
  font-family:'Fredoka One',cursive;
  color:var(--yellow);
  font-size:50px;
  line-height:1;
  text-align:center;
  margin:4px 0 0;
}
.hero-sub{
  text-align:center;
  color:var(--muted);
  font-weight:800;
  font-size:17px;
  line-height:1.35;
}
.progress-wrap{width:100%;max-width:500px;margin:0 auto}
.progress-row{
  display:flex;justify-content:space-between;align-items:center;
  margin-top:8px;margin-bottom:8px;font-weight:800;
}
.progress-outer{
  background:rgba(255,255,255,.10);
  border-radius:999px;
  height:14px;
  overflow:hidden;
  box-shadow:inset 0 2px 10px rgba(0,0,0,.2);
}
.progress-inner{
  background:linear-gradient(90deg,#ffd94a 0%, var(--yellow) 100%);
  height:100%;width:0%;transition:.25s;border-radius:999px;
}
.tiny-pill{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  padding:6px 10px;
  border-radius:999px;
  font-weight:900;
  font-size:11px;
  background:rgba(255,255,255,.10);
}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.world-card{
  border-radius:28px;
  padding:18px;
  background:linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.05));
  border:1px solid rgba(255,255,255,.08);
  box-shadow:0 14px 34px rgba(0,0,0,.30);
  cursor:pointer;
}
.world-card .emoji{font-size:44px}
.world-card .name{

  font-size:22px;
  margin-top:8px;
}
.world-card .desc{
  opacity:.78;
  margin-top:6px;
  font-weight:800;
  font-size:13px;
  line-height:1.3;
}
.world-card.disabled{
  opacity:.42;
  filter:saturate(.55);
  cursor:not-allowed;
}
.badge{
  display:inline-block;
  margin-top:10px;
  padding:6px 10px;
  border-radius:999px;
  font-weight:900;
  font-size:12px;
  background:rgba(255,255,255,.12);
}
.select-age{

  align-items:center;
  justify-content:space-between;
  gap:16px;
  border-radius:28px;
  padding:22px;
  color:white;
}
.age-1{
  background:linear-gradient(180deg, rgba(75,231,255,.16), rgba(75,231,255,.08));
  border:2px solid rgba(75,231,255,.28);
}
.age-2{
  background:linear-gradient(180deg, rgba(255,94,108,.18), rgba(255,94,108,.08));
  border:2px solid rgba(255,94,108,.28);
}
.mission-shell{
  background:linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.05));
  border-radius:32px;
  padding:18px;
  border:1px solid rgba(255,255,255,.08);
  box-shadow:0 14px 34px rgba(0,0,0,.30);
}
.chapter-badge{

  align-items:center;
  justify-content:center;

  padding:8px 14px;
  border-radius:999px;
  background:rgba(75,231,255,.12);
  color:var(--cyan);
  font-weight:900;
  font-size:12px;

.mission-title{

  color:var(--yellow);
  line-height:1.05;

.mission-story{

.objective-box{

  padding:14px;

  color:var(--cyan);

.parent-box{

.parent-box-title{

.parent-box-text{

.step-card{

.step-head{

  gap:14px;
  align-items:center;

.step-icon{
  width:48px;height:48px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  background:var(--pink);
  color:white;
  font-size:22px;
  flex:0 0 auto;
  box-shadow:0 6px 14px rgba(255,94,108,.25);

.step-title{

  font-size:18px;

.visual-panel{

  padding:16px;
  background:

  min-height:150px;
  display:flex;
  flex-direction:column;
  justify-content:center;
  gap:14px;

.visual-row{
  display:flex;

  justify-content:center;
  gap:14px;

}
.visual-item{

  align-items:center;
  gap:6px;

.visual-emoji{

.visual-label{

.visual-arrow{
  font-size:28px;
  color:var(--cyan);

.visual-note{
  text-align:center;
  font-size:12px;
  color:var(--muted2);
  font-weight:800;
}
.controls-row{

  gap:12px;

.controls-row .ghost-btn,

.helper-text{
  opacity:.62;
  font-weight:800;
  font-size:12px;
  text-align:center;

#splash-screen{
  position:fixed; inset:0; z-index:5000;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  background:
    radial-gradient(circle at 50% 35%, rgba(75,231,255,.16) 0%, transparent 34%),
    linear-gradient(180deg,#10183a 0%, var(--bg) 100%);
}
#splash-screen .logo{
  font-family:'Fredoka One',cursive;
  font-size:46px;
  color:var(--yellow);
  text-shadow:3px 3px var(--pink);
  margin-top:10px;
}
#splash-screen .sub{
  opacity:.72;
  margin-top:6px;
  font-weight:800;
}
#diario-modal{
  position:fixed; inset:0; z-index:4000;
  display:none; flex-direction:column; padding:28px 18px;
  background:linear-gradient(180deg, #101a3b, #091127);
  overflow-y:auto;
}
.scheda-ricordo{
  background:rgba(255,255,255,.08);
  padding:18px;
  border-radius:24px;
  margin-bottom:12px;
  border-left:8px solid var(--cyan);
  display:flex;
  gap:14px;
  align-items:center;
}
.emoji-diario{font-size:28px;opacity:.95}
.testo-diario b{display:block;font-size:18px;color:var(--yellow)}
.testo-diario small{opacity:.62;font-size:12px}
#overlay-success{
  position:fixed; inset:0; z-index:4500;
  display:none; align-items:center; justify-content:center;
  background:rgba(10,17,40,.92);
}
.messaggio-vittoria{
  font-family:'Fredoka One';
  font-size:48px;
  color:var(--yellow);
  text-shadow:4px 4px var(--pink);
  text-align:center;
}
.cascata{
  position:absolute; top:-20px; pointer-events:none;
  animation:caduta 2s linear forwards; font-size:28px;
}
@keyframes caduta{
  to{transform:translateY(110vh) rotate(360deg);opacity:0}
}
@media (max-width:440px){
  .hero-title{font-size:46px}
  .brand{font-size:28px}
  .mission-title{font-size:24px}
  .visual-emoji{font-size:34px}
}
</style>
</head>

/* ========= SUONI ========= */
function playTone(freq=520, duration=0.08, type="sine", volume=0.02){
  if(!state.audio) return;
  try{
    const AudioCtx = window.AudioContext || window.webkitAudioContext;
    if(!AudioCtx) return;
    if(!window.__sparkCtx) window.__sparkCtx = new AudioCtx();
    const ctx = window.__sparkCtx;
    if (ctx.state === "suspended") ctx.resume();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = type;
    osc.frequency.value = freq;
    gain.gain.value = volume;
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start();
    gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + duration);
    osc.stop(ctx.currentTime + duration);
  }catch(e){}
}
function sfxClick(){ playTone(560, 0.05, "triangle", 0.015); }
function sfxSuccess(){
  playTone(660, 0.08, "triangle", 0.02);
  setTimeout(()=>playTone(830, 0.10, "triangle", 0.02), 90);

}

function getTodayKey(){
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
}
function limiteOggi(){ return state.oggiLimite + state.extraSbloccate; }

function caricaPreferenze(){
  const a = localStorage.getItem("sparkplay_audio");
  state.audio = a === null ? true : a === "1";
  const d = localStorage.getItem("sparkplay_diario");
  state.diario = d ? JSON.parse(d) : [];
}
function salvaPreferenze(){
  localStorage.setItem("sparkplay_audio", state.audio ? "1" : "0");
}
function caricaStatoGiorno(){
  state.oggiKey = getTodayKey();
  const saved = JSON.parse(localStorage.getItem("sparkplay_day") || "{}");
  if(saved.key === state.oggiKey){
    state.oggiFatte = Number(saved.oggiFatte || 0);
    state.extraSbloccate = Number(saved.extraSbloccate || 0);
    state.bonusUsatoOggi = !!saved.bonusUsatoOggi;
    state.specialeFattaOggi = !!saved.specialeFattaOggi;
  } else {
    state.oggiFatte = 0;
    state.extraSbloccate = 0;
    state.bonusUsatoOggi = false;
    state.specialeFattaOggi = false;
    salvaStatoGiorno();
  }
}
function salvaStatoGiorno(){
  localStorage.setItem("sparkplay_day", JSON.stringify({
    key: state.oggiKey,
    oggiFatte: state.oggiFatte,
    extraSbloccate: state.extraSbloccate,
    bonusUsatoOggi: state.bonusUsatoOggi,
    specialeFattaOggi: state.specialeFattaOggi
  }));
}
function caricaCampagna(){
  const saved = JSON.parse(localStorage.getItem("sparkplay_campaign") || "{}");
  const w = saved[state.world];
  state.storyIndex = Number.isFinite(w?.storyIndex) ? w.storyIndex : 0;
}
function salvaCampagna(){
  const saved = JSON.parse(localStorage.getItem("sparkplay_campaign") || "{}");
  saved[state.world] = { storyIndex: state.storyIndex };
  localStorage.setItem("sparkplay_campaign", JSON.stringify(saved));
}
function salvaDiario(){
  localStorage.setItem("sparkplay_diario", JSON.stringify(state.diario));
}
function buildMission(raw, eta){
  return {
    title: raw.title,
    chapter: raw.chapter,
    story: raw.story,
    goal: raw.goal,
    parent: eta === "5-7" ? raw.parent : "",
    steps: raw[eta === "5-7" ? "age_5_7" : "age_8_10"],
    success: raw.success
  };
}

/* ========= FX ========= */
function creaStelle(n=18){
  for(let i=0;i<n;i++){
    const el = document.createElement("div");
    el.className = "cascata";
    el.textContent = "✨";
    el.style.left = (Math.random()*100) + "vw";
    el.style.animationDuration = (1.2 + Math.random()*1.4) + "s";
    document.body.appendChild(el);
    setTimeout(()=>el.remove(), 2200);
  }
}
function vibra(){
  try{ if(navigator.vibrate) navigator.vibrate([150,70,150]); }catch(e){}
}

/* ========= VISUAL ========= */
function renderVisual(v){
  if(!v) return "";
  const rows = [];
  const items = v.items || [];
  rows.push(`
    <div class="visual-row">
      ${items.map(([emoji,label]) => emoji === "➡️" || emoji === "⬇️" || emoji === "↔️" || emoji==="➕"
        ? `<div class="visual-arrow">${emoji}</div>`
        : `<div class="visual-item"><div class="visual-emoji">${emoji}</div>${label ? `<div class="visual-label">${label}</div>` : ""}</div>`
      ).join("")}
    </div>
  `);
  return `
    <div class="visual-panel">
      ${rows.join("")}
      ${v.note ? `<div class="visual-note">${v.note}</div>` : ""}
    </div>
  `;
}

/* ========= HELPERS ========= */
function progressPercent(){
  return Math.min(100, (state.oggiFatte / Math.max(1, limiteOggi())) * 100);
}
function homeHint(){
  if(state.oggiFatte < limiteOggi()){
    return "Missioni con oggetti di casa. Sicure. Creative. Subito pronte.";
  }
  if(!state.bonusUsatoOggi){
    return "Hai finito le missioni di oggi. Il genitore può sbloccare +3 una sola volta.";
  }
  return "Hai finito le missioni di oggi. Torna domani per continuare.";
}

          `}
        </div>

        <div class="controls-row">
          ${parentMode ? `
            <button class="primary-btn" onclick="continuaDopoGenitore()">HO CAPITO ✅</button>
          ` : `
            ${state.stepIndex > 0 ? `<button class="ghost-btn" onclick="precedente()">INDIETRO</button>` : `<button class="ghost-btn disabled">INDIETRO</button>`}
            <button class="primary-btn" onclick="successivo()">${state.stepIndex < m.steps.length-1 ? "FATTO" : "COMPLETA ✅"}</button>
          `}
        </div>
      </div>
    `;
    return;
  }

  if(state.fsm === "SCELTA_GENITORE"){
    const sbloccabileSpeciale = (state.oggiFatte >= 3) && !state.specialeFattaOggi;
    const puoBonus = !state.bonusUsatoOggi;

    app.innerHTML = `
      <div class="top">
        <div class="brand" style="font-size:26px">GENITORE</div>
        <button class="ghost-btn" onclick="home()">CHIUDI</button>
      </div>
      <div class="content">
        <div class="card center">
          <h2 style="margin:0; font-family:'Fredoka One'; color:var(--yellow); font-size:30px;">STOP DEL GIORNO 🧡</h2>
          <div style="margin-top:8px; opacity:.88; font-weight:900;">
            Oggi: <b>${state.oggiFatte}</b>/${limiteOggi()} missioni
          </div>
          <div class="helper-text" style="margin-top:10px;">
            Il limite giornaliero serve a mantenere un ritmo sano. Il bonus si usa una sola volta al giorno.
          </div>
        </div>

        ${sbloccabileSpeciale
          ? `<button class="secondary-btn" onclick="apriGate('SPECIALE')">MISSIONE SPECIALE 🤝</button>`
          : `<div class="helper-text">${state.specialeFattaOggi ? "🌟 Missione speciale già fatta oggi." : "🌟 Missione speciale disponibile dopo 3 missioni."}</div>`
        }

        ${puoBonus
          ? `<button class="secondary-btn" onclick="apriGate('ALTRE')">SBLOCCA +3 🚀 (1 VOLTA OGGI)</button>`
          : `<button class="secondary-btn disabled">BONUS GIÀ USATO OGGI ✅</button>`
        }

        <button class="danger-btn" style="width:100%;" onclick="home()">FINISCI PER OGGI</button>
      </div>
    `;
    return;
  }

  if(state.fsm === "GATE"){
    const titolo = state.gateTipo === "SPECIALE"
      ? "SBLOCCA MISSIONE SPECIALE"
      : "SBLOCCA +3 (SOLO 1 VOLTA OGGI)";
    app.innerHTML = `
      <div class="top">
        <div class="brand" style="font-size:26px">GENITORE</div>
        <button class="ghost-btn" onclick="annullaGate()">ANNULLA</button>
      </div>
      <div class="content">
        <div class="card center">
          <div style="font-family:'Fredoka One'; color:var(--yellow); font-size:22px;">${titolo}</div>
          <div style="opacity:.78; font-weight:900; margin-top:10px;">Quanto fa <span style="color:var(--yellow)">5 + 5</span>?</div>
          <input id="gate-input" inputmode="numeric" pattern="[0-9]*" placeholder="Risposta"
            style="width:100%; margin-top:14px; padding:16px; border-radius:18px; border:2px solid rgba(255,255,255,.18); background:rgba(0,0,0,.25); color:white; font-size:18px; text-align:center; outline:none;">
          ${state.gateErrore ? `<div style="margin-top:10px; color:${'#ff5e6c'}; font-weight:900;">${state.gateErrore}</div>` : ``}
          <button class="primary-btn" style="margin-top:14px;" onclick="verificaGate()">CONFERMA ✅</button>
          <div class="helper-text" style="margin-top:10px;">Gate semplice per evitare sblocchi accidentali.</div>
        </div>
      </div>
    `;
  }
}

/* ========= AZIONI ========= */
function home(){
  sfxClick();
  state.fsm = "INIZIO";
  state.stepIndex = 0;
  state.missioneAttuale = null;
  state.vistoGenitore = false;
  render();
}
function vaiMondi(){
  sfxClick();
  state.fsm = state.oggiFatte >= limiteOggi() ? "SCELTA_GENITORE" : "MONDI";
  render();
}
function scegliMondo(w){
  if(w !== "spazio") return;
  sfxClick();
  state.world = w;
  caricaCampagna();
  state.fsm = "ETA";
  render();
}
function scegliEta(eta){
  sfxClick();
  state.eta = eta;
  if(state.oggiFatte >= limiteOggi()){
    state.fsm = "SCELTA_GENITORE";
    render();
    return;
  }
  proproxima();
}
function apriDiario(){
  sfxClick();
  const l = document.getElementById("lista-diario");
  l.innerHTML = state.diario.length
    ? state.diario.map(m => `
      <div class="scheda-ricordo">
        <div class="emoji-diario">📖</div>
        <div class="testo-diario">
          <small>${m.data}</small>
          <b>${m.titolo}</b>
        </div>
      </div>`).join("")
    : "<p class='center' style='opacity:.65; font-weight:900;'>Il diario è vuoto.</p>";
  document.getElementById("diario-modal").style.display = "flex";
}
function chiudiDiario(){
  sfxClick();
  document.getElementById("diario-modal").style.display = "none";
}
function apriGate(tipo){
  sfxClick();
  state.gateTipo = tipo;
  state.gateErrore = "";
  state.fsm = "GATE";
  render();
}
function annullaGate(){
  sfxClick();
  state.fsm = "SCELTA_GENITORE";
  render();
}
function verificaGate(){
  const v = (document.getElementById("gate-input")?.value || "").trim();
  if(v !== "10"){
    state.gateErrore = "Risposta errata. Riprova 🙂";
    render();
    return;
  }
  sfxClick();

  if(state.gateTipo === "ALTRE"){
    if(state.bonusUsatoOggi){
      state.gateErrore = "Bonus già usato oggi. Torna domani 🙂";
      render();
      return;
    }
    state.bonusUsatoOggi = true;
    state.extraSbloccate = 3;
    salvaStatoGiorno();
    proproxima();
    return;
  }

  if(state.gateTipo === "SPECIALE"){
    if(state.specialeFattaOggi){
      state.gateErrore = "Missione speciale già fatta oggi.";
      render();
      return;
    }
    state.specialeFattaOggi = true;
    salvaStatoGiorno();
    state.missioneIsSpeciale = true;
    state.missioneAttuale = buildMission(SPECIAL_MISSION, state.eta);
    state.stepIndex = 0;
    state.vistoGenitore = state.eta !== "5-7";
    state.fsm = "GIOCO";
    render();
  }
}
function continuaDopoGenitore(){
  sfxClick();
  state.vistoGenitore = true;
  render();
}
function proproxima(){
  if(!state.eta){
    state.fsm = "ETA";
    render();
    return;
  }
  if(state.oggiFatte >= limiteOggi()){
    state.fsm = "SCELTA_GENITORE";
    render();
    return;
  }
  const raw = MISSIONS[state.storyIndex % MISSIONS.length];
  state.missioneIsSpeciale = false;
  state.missioneAttuale = buildMission(raw, state.eta);
  state.stepIndex = 0;
  state.vistoGenitore = state.eta !== "5-7";
  state.fsm = "GIOCO";
  render();
}
function precedente(){
  if(state.stepIndex <= 0) return;
  sfxClick();
  state.stepIndex--;
  render();
}
function successivo(){
  const m = state.missioneAttuale;
  if(state.stepIndex < m.steps.length - 1){
    sfxClick();
    state.stepIndex++;
    render();
    return;
  }

  document.getElementById("overlay-success").style.display = "flex";
  creaStelle(22);
  vibra();
  sfxSuccess();

  state.diario.unshift({
    titolo: m.title,
    data: new Date().toLocaleDateString("it-IT")
  });
  salvaDiario();

  setTimeout(()=>{
    document.getElementById("overlay-success").style.display = "none";

    if(state.missioneIsSpeciale){
      state.fsm = "SCELTA_GENITORE";
      state.vistoGenitore = false;
      render();
      return;
    }

    state.oggiFatte++;
    salvaStatoGiorno();
    state.storyIndex++;
    salvaCampagna();
    state.vistoGenitore = false;

    if(state.oggiFatte >= limiteOggi()){
      state.fsm = "SCELTA_GENITORE";
      render();
      return;
    }

    proproxima();
  }, 1600);
}

/* ========= BOOTSTRAP ========= */
caricaPreferenze();
caricaStatoGiorno();
caricaCampagna();

window.addEventListener("load", ()=>{
  const splash = document.getElementById("splash-screen");
  if(splash) setTimeout(()=>{ splash.style.display = "none"; }, 900);
});

render();
</script>
</body>
</html>
