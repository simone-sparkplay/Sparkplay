<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SparkPlay</title>
    <style>
        :root {
            --bg-deep: #060814;
            --accent-magic: #a27cff;
            --accent-gold: #ffdb58;
            --text-main: #ffffff;
            --text-soft: #94a3b8;
            --panel-glass: rgba(255, 255, 255, 0.08);
            --inner-glow: inset 0 0 15px rgba(162, 124, 255, 0.2);
            --svg-glow: drop-shadow(0 0 8px rgba(162, 124, 255, 0.6));
            --gold-glow: drop-shadow(0 0 10px rgba(255, 219, 88, 0.5));
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        html, body {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: var(--bg-deep);
            background-image: radial-gradient(circle at 50% 50%, #161b3d 0%, #060814 100%);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            overflow: hidden;
        }

        body { display: flex; justify-content: center; align-items: center; }

        .screen {
            display: none; flex-direction: column; align-items: center; justify-content: center;
            width: 100%; height: 100%; padding: 40px; text-align: center;
            position: absolute; opacity: 0; transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            pointer-events: none; transform: scale(0.92);
        }

        .screen.active { display: flex; opacity: 1; pointer-events: auto; z-index: 10; transform: scale(1); }

        /* --- SVG STYLING --- */
        .icon-svg {
            width: 80px; height: 80px;
            fill: none; stroke: currentColor;
            stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round;
            filter: var(--svg-glow);
            margin-bottom: 20px;
        }
        .icon-gold { color: var(--accent-gold); filter: var(--gold-glow); }
        .icon-white { color: #fff; }

        /* --- UI ELEMENTS --- */
        h1 { 
            font-size: 4rem; margin: 0; font-weight: 800; letter-spacing: -1.5px;
            background: linear-gradient(to bottom, #ffffff 40%, #c0a4ff 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .btn-main {
            background: linear-gradient(180deg, #b37cff 0%, #7c4dff 100%);
            color: white; border: none; border-radius: 60px; 
            padding: 22px 65px; font-size: 1.8rem; font-weight: 700; cursor: pointer;
            box-shadow: 0 10px 0 #4a2d7a, 0 20px 40px rgba(0,0,0,0.5);
            transition: all 0.15s ease; text-transform: uppercase; margin-top: 40px;
        }
        .btn-main:active { transform: translateY(8px); box-shadow: 0 2px 0 #4a2d7a; }

        .diary-trigger {
            position: absolute; top: 30px; right: 25px;
            width: 52px; height: 52px; border-radius: 50%;
            background: #1a1c3d; border: 2px solid var(--accent-gold);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; z-index: 100; box-shadow: 0 0 20px rgba(255, 219, 88, 0.3);
        }
        .diary-trigger .icon-svg { width: 28px; height: 28px; margin: 0; }

        .diary-modal {
            background: #0a0b1e; border: 2px solid var(--accent-gold); border-radius: 35px;
            padding: 35px; width: 90%; max-width: 350px;
        }

        .quest-card {
            background: var(--panel-glass); border-radius: 40px; padding: 50px 35px;
            width: 100%; max-width: 380px; border: 1px solid rgba(255,255,255,0.12);
            box-shadow: 0 20px 50px rgba(0,0,0,0.3), var(--inner-glow);
            backdrop-filter: blur(12px); position: relative;
        }

        .quest-badge {
            position: absolute; top: -18px; left: 50%; transform: translateX(-50%);
            background: var(--accent-magic); color: white; padding: 8px 22px;
            border-radius: 20px; font-size: 0.85rem; font-weight: 700;
        }

        .reward-card {
            background: radial-gradient(circle at center, rgba(255, 219, 88, 0.15) 0%, transparent 75%);
            padding: 40px 20px; border-radius: 40px;
        }

        .icon-container-large .icon-svg { width: 120px; height: 120px; }

        .btn-sec { background: transparent; border: 2px solid rgba(255,255,255,0.1); color: var(--text-soft); padding: 15px 30px; border-radius: 20px; margin-top: 30px; cursor: pointer; }
        .world-portal { background: var(--panel-glass); border-radius: 40px; padding: 50px; border: 1px solid rgba(162, 124, 255, 0.2); width: 280px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="diary-trigger" class="diary-trigger" onclick="nav('diary-screen')">
        <svg class="icon-svg icon-gold" viewBox="0 0 24 24">
            <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path>
            <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path>
            <path d="M12 8l1.5 3h3l-2.5 2 1 3.5-3-2-3 2 1-3.5-2.5-2h3z" fill="currentColor" stroke="none"></path>
        </svg>
    </div>

    <section id="home" class="screen active">
        <h1>SparkPlay</h1>
        <button class="btn-main" onclick="nav('world-select')">Gioca</button>
    </section>

    <section id="diary-screen" class="screen">
        <div class="diary-modal">
            <span style="color:var(--accent-gold); font-size: 0.9rem; letter-spacing: 3px; font-weight: 700; text-transform: uppercase;">Diario di Bordo</span>
            <div id="diary-content" style="margin-top:25px; text-align: left;">
                <p style="color:var(--text-soft); font-size: 0.8rem; margin: 10px 0;">MONDO: <span id="d-world" style="color:#fff; font-weight:700">--</span></p>
                <p style="color:var(--text-soft); font-size: 0.8rem; margin: 10px 0;">TITOLO: <span id="d-badge" style="color:#fff; font-weight:700">--</span></p>
                <p style="color:var(--text-soft); font-size: 0.8rem; margin: 10px 0;">SUPER MISSIONE: <span id="d-super" style="color:#fff; font-weight:700">--</span></p>
            </div>
            <button class="btn-sec" onclick="nav('home')" style="width:100%; color:#fff;">Chiudi</button>
        </div>
    </section>

    <section id="world-select" class="screen">
        <div class="world-portal" onclick="startSession('Spazio')">
            <svg class="icon-svg icon-white" viewBox="0 0 24 24">
                <path d="M12 2c5 0 8 5 8 10 0 4-3 6-3 6l1 4-6-2-6 2 1-4s-3-2-3-6c0-5 3-10 8-10z"></path>
                <path d="M12 9a2 2 0 1 0 0 4 2 2 0 0 0 0-4z"></path>
                <path d="M9 20s-1 2-3 2M15 20s1 2 3 2"></path>
            </svg>
            <div style="letter-spacing:4px; font-weight:700; color: #fff;">SPAZIO</div>
        </div>
        <button class="btn-sec" onclick="nav('home')">Indietro</button>
    </section>

    <section id="mission" class="screen">
        <div class="quest-card">
            <div id="m-progress" class="quest-badge">Missione 1 di 3</div>
            <div id="m-icon-box" class="icon-container-large">
                </div>
            <p id="m-text" style="font-size: 1.7rem; line-height: 1.5;">...</p>
        </div>
        <button class="btn-main" onclick="handleComplete()">Completato!</button>
    </section>

    <section id="alert-s" class="screen">
        <svg class="icon-svg icon-gold" style="width:150px; height:150px" viewBox="0 0 24 24">
            <path d="M2 22l4-4M22 2l-4 4M2 2l4 4M22 22l-4-4"></path>
            <path d="M12 2v4m0 12v4M2 12h4m12 0h4"></path>
            <circle cx="12" cy="12" r="3"></circle>
        </svg>
        <h1 style="font-size: 2.5rem; margin-top: 20px;">SUPER MISSIONE!</h1>
    </section>

    <section id="end-screen" class="screen">
        <div class="reward-card">
            <svg class="icon-svg icon-gold" style="width:120px; height:120px" viewBox="0 0 24 24">
                <path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"></path>
                <path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"></path>
                <path d="M4 22h16"></path>
                <path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"></path>
                <path d="M14 14.66V17c0 .55.47.98.97 1.21 1.18.54 2.03 2.03 2.03 3.79"></path>
                <path d="M12 2v12.66"></path>
                <path d="M12 2a6 6 0 0 1 6 6v1c0 3.31-2.69 6-6 6s-6-2.69-6-6V8a6 6 0 0 1 6-6z"></path>
            </svg>
            <div id="final-badge" style="font-size: 2.3rem; color: var(--accent-gold); font-weight: 800;">--</div>
        </div>
        <button class="btn-main" onclick="saveAndHome()">Torna alla Base</button>
    </section>

    <script>
        // --- SVG REPOSITORY ---
        const svgs = {
            // Nuova icona "Radar/Explorer" per le missioni normali
            mission: `<svg class="icon-svg icon-white" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"></circle><circle cx="12" cy="12" r="2"></circle><path d="M12 3v2M12 19v2M3 12h2M19 12h2"></path><path d="M18 6l-1.5 1.5M7.5 16.5L6 18"></path><path stroke-dasharray="2,2" d="M12 7a5 5 0 0 1 5 5"></path></svg>`,
            super: `<svg class="icon-svg icon-gold" viewBox="0 0 24 24"><path d="M12 2l3 7h7l-5.5 4.5 2 7.5-6.5-5-6.5 5 2-7.5L2 9h7z"></path></svg>`
        };

        let diaryData = { world: "--", badge: "--", super: "--" };
        let currentSessionBadge = "";

        const missions = [
            { t: "Trova un oggetto <b>rosso</b> come Marte! ", i: 'mission' },
            { t: "Fai 5 salti spaziali verso l'alto! ", i: 'mission' },
            { t: "Cerca qualcosa di <b>tondo</b> come la Luna! ", i: 'mission' }
        ];
        const badges = ["Esploratore Spaziale", "Comandante", "Eroe Galattico"];
        const superM = { name: "Base di Cuscini", t: "Costruisci una <b>base spaziale</b> con i cuscini!", i: 'super' };
        
        let state = { count: 0, pool: [], world: "" };

        function startSession(w) {
            state.world = w;
            state.pool = [...missions].sort(() => 0.5 - Math.random());
            state.count = 0;
            updateUI();
            nav('mission');
        }

        function updateUI() {
            let d = (state.count < 3) ? state.pool[state.count] : superM;
            document.getElementById('m-progress').innerText = (state.count < 3) ? `Missione ${state.count+1} di 3` : "SFIDA FINALE";
            document.getElementById('m-text').innerHTML = d.t;
            document.getElementById('m-icon-box').innerHTML = svgs[d.i];
        }

        function handleComplete() {
            state.count++;
            if (state.count === 3) {
                nav('alert-s');
                setTimeout(() => { updateUI(); nav('mission'); }, 2200);
            } else if (state.count > 3) {
                currentSessionBadge = badges[Math.floor(Math.random() * badges.length)];
                document.getElementById('final-badge').innerText = currentSessionBadge;
                nav('end-screen');
            } else {
                updateUI();
            }
        }

        function saveAndHome() {
            diaryData.world = state.world;
            diaryData.badge = currentSessionBadge;
            diaryData.super = superM.name;
            document.getElementById('d-world').innerText = diaryData.world;
            document.getElementById('d-badge').innerText = diaryData.badge;
            document.getElementById('d-super').innerText = diaryData.super;
            nav('home');
        }

        function nav(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.getElementById('diary-trigger').style.display = (id === 'home') ? 'flex' : 'none';
        }
    </script>
</body>
</html>
