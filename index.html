<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SparkPlay - Avventura Spaziale</title>
    <style>
        :root {
            --bg-space: #0b0e28;
            --p-magic: #a27cff;
            --p-magic-deep: #7c4dff;
            --s-gold: #ffdb58;
            --s-cyan: #4deeea;
            --text-white: #ffffff;
            --card-glass: rgba(255, 255, 255, 0.1);
            --shadow-game: 0 10px 0 rgba(0, 0, 0, 0.4);
            --font-main: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: var(--bg-space);
            background-image: radial-gradient(circle at 50% 20%, #1a1c4d 0%, #0b0e28 100%);
            color: var(--text-white);
            font-family: var(--font-main);
            overflow: hidden;
            display: flex; justify-content: center; align-items: center;
            user-select: none;
        }

        /* --- BACKGROUND STARS --- */
        .star-bg {
            position: absolute; width: 2px; height: 2px; background: white;
            border-radius: 50%; opacity: 0.3; animation: blink 3s infinite;
        }
        @keyframes blink { 0%, 100% { opacity: 0.3; } 50% { opacity: 0.8; } }

        /* --- SCREEN MANAGEMENT --- */
        .screen {
            position: absolute; width: 100%; height: 100%;
            display: none; flex-direction: column; align-items: center; justify-content: center;
            padding: 30px; text-align: center;
            opacity: 0; transform: scale(0.9);
            transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .screen.active { display: flex; opacity: 1; transform: scale(1); z-index: 10; }

        /* --- UI ELEMENTS --- */
        h1 {
            font-size: 4rem; margin: 0; font-weight: 900;
            background: linear-gradient(to bottom, #fff 40%, var(--p-magic) 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 15px rgba(162, 124, 255, 0.5));
        }

        .btn-game {
            background: linear-gradient(180deg, var(--p-magic) 0%, var(--p-magic-deep) 100%);
            color: white; border: 4px solid rgba(255, 255, 255, 0.2); border-radius: 50px;
            padding: 20px 50px; font-size: 1.6rem; font-weight: 800; cursor: pointer;
            box-shadow: var(--shadow-game);
            transition: all 0.1s ease; text-transform: uppercase;
            margin-top: 25px;
        }
        .btn-game:active { transform: translateY(6px); box-shadow: 0 4px 0 rgba(0,0,0,0.4); }

        .btn-sec {
            background: rgba(255, 255, 255, 0.1); border: none;
            color: var(--text-white); padding: 12px 25px; border-radius: 20px;
            font-weight: 700; cursor: pointer; margin-top: 20px;
        }

        /* --- QUEST CARD --- */
        .quest-card {
            background: var(--card-glass); border-radius: 40px; padding: 40px 30px;
            width: 100%; max-width: 400px; border: 2px solid rgba(255,255,255,0.1);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            position: relative;
        }

        .progress-bar { display: flex; gap: 8px; margin-bottom: 25px; justify-content: center; }
        .step-dot { width: 40px; height: 10px; border-radius: 5px; background: rgba(255,255,255,0.2); transition: 0.4s; }
        .step-dot.completed { background: var(--s-cyan); box-shadow: 0 0 10px var(--s-cyan); }
        .step-dot.active { background: var(--s-gold); box-shadow: 0 0 10px var(--s-gold); transform: scaleX(1.2); }

        .quest-text { font-size: 1.6rem; font-weight: 700; line-height: 1.4; margin: 20px 0; min-height: 80px; }
        .quest-text b { color: var(--s-gold); }

        /* --- ICONS --- */
        .icon-box { height: 130px; display: flex; align-items: center; justify-content: center; animation: float 4s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-12px); } }

        /* --- DIARY BUTTON --- */
        .diary-btn {
            position: absolute; top: 25px; right: 25px; width: 55px; height: 55px;
            background: #1a1c3d; border: 3px solid var(--s-gold); border-radius: 15px;
            display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 100;
        }

        /* --- CONFETTI --- */
        #canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 100; }
    </style>
</head>
<body>

    <canvas id="canvas"></canvas>

    <div id="diary-trigger" class="diary-btn" onclick="openDiary()">
        <svg width="30" height="30" viewBox="0 0 24 24" fill="#ffdb58"><path d="M18 2H6c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zM9 4h2v5l-1-1-1 1V4z"/></svg>
    </div>

    <section id="home" class="screen active">
        <div class="icon-box">
            <svg width="150" height="150" viewBox="0 0 120 120">
                <defs><linearGradient id="g1" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#fff"/><stop offset="100%" stop-color="#a27cff"/></linearGradient></defs>
                <circle cx="60" cy="60" r="50" fill="rgba(162,124,255,0.1)"/>
                <path d="M60 15 L85 85 L60 70 L35 85 Z" fill="url(#g1)" stroke="#fff" stroke-width="2"/>
            </svg>
        </div>
        <h1>SparkPlay</h1>
        <button class="btn-game" onclick="startAdventure()">Inizia l'Avventura</button>
    </section>

    <section id="mission-screen" class="screen">
        <div class="quest-card">
            <div id="progress-bar" class="progress-bar"></div>
            <div id="m-icon" class="icon-box"></div>
            <p id="m-text" class="quest-text">Caricamento missione...</p>
        </div>
        <button class="btn-game" onclick="completeStep()">Completato!</button>
    </section>

    <section id="super-alert" class="screen" style="background: rgba(11,14,40,0.95);">
        <div class="icon-box">
            <svg width="150" height="150" viewBox="0 0 100 100">
                <path d="M50 5 L63 38 L95 38 L68 58 L78 90 L50 72 L22 90 L32 58 L5 38 L37 38 Z" fill="#ffdb58" stroke="#fff" stroke-width="3"/>
            </svg>
        </div>
        <h2 style="font-size: 3rem; color: var(--s-gold); margin: 0;">SFIDA FINALE!</h2>
        <p style="font-size: 1.4rem;">Preparati per l'ultima grande prova...</p>
    </section>

    <section id="end-screen" class="screen">
        <div class="icon-box" style="animation: none;">
            <svg width="180" height="180" viewBox="0 0 100 100">
                <circle cx="50" cy="50" r="45" fill="rgba(255,219,88,0.2)"/>
                <path d="M30 30 L70 30 L70 50 Q70 70 50 70 Q30 70 30 50 Z" fill="#ffdb58" stroke="#fff" stroke-width="2"/>
                <path d="M50 70 L50 85 M40 85 L60 85" stroke="#ffdb58" stroke-width="5" stroke-linecap="round"/>
            </svg>
        </div>
        <h2 style="font-size: 2.5rem; color: var(--s-gold); margin-bottom: 0;">BRAVISSIMO!</h2>
        <p id="reward-title" style="font-size: 1.8rem; font-weight: 800; margin: 10px 0;">TITOLO OTTENUTO</p>
        <p style="opacity: 0.8;">Missioni completate con successo!</p>
        <button class="btn-game" onclick="location.reload()">Torna Domani</button>
    </section>

    <section id="diary-screen" class="screen">
        <div class="quest-card">
            <h2 style="color: var(--s-gold); margin-top: 0;">Il tuo Diario</h2>
            <div id="diary-content" style="text-align: left; max-height: 250px; overflow-y: auto; padding-right: 10px;"></div>
            <button class="btn-game" style="width: 100%;" onclick="nav('home')">Chiudi</button>
        </div>
    </section>

    <script>
        const state = {
            step: 0,
            missions: [],
            isFinished: false
        };

        const icons = {
            robot: `<svg width="100" height="100" viewBox="0 0 120 120"><rect x="30" y="40" width="60" height="50" rx="15" fill="#a27cff"/><rect x="40" y="50" width="40" height="20" rx="5" fill="#1a1c3d"/><circle cx="50" cy="60" r="4" fill="#4deeea"/><circle cx="70" cy="60" r="4" fill="#4deeea"/><path d="M60 40V30" stroke="#ffdb58" stroke-width="5" stroke-linecap="round"/><circle cx="60" cy="30" r="5" fill="#ffdb58"/></svg>`,
            star: `<svg width="100" height="100" viewBox="0 0 100 100"><path d="M50 10 L60 40 L90 40 L65 60 L75 90 L50 70 L25 90 L35 60 L10 40 L40 40 Z" fill="#ffdb58" stroke="#fff" stroke-width="2"/></svg>`
        };

        const missionPool = [
            { t: "Trova un oggetto <b>Rosso</b> come Marte!", i: icons.robot },
            { t: "Fai 5 <b>Salti Spaziali</b> velocissimi!", i: icons.robot },
            { t: "Trova una cosa <b>Tonda</b> come un pianeta!", i: icons.robot }
        ];

        const superMission = { t: "Costruisci una <b>Base Spaziale</b> con i cuscini!", i: icons.star };

        function initStars() {
            for (let i = 0; i < 50; i++) {
                const star = document.createElement('div');
                star.className = 'star-bg';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.animationDelay = Math.random() * 3 + 's';
                document.body.appendChild(star);
            }
        }

        function nav(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            const target = document.getElementById(id);
            target.style.display = 'flex';
            setTimeout(() => target.classList.add('active'), 50);
        }

        function startAdventure() {
            const lastDate = localStorage.getItem('spark_play_date');
            if (lastDate === new Date().toDateString()) {
                alert("Hai già completato le missioni di oggi! Torna domani per nuove sfide.");
                return;
            }
            state.step = 0;
            state.missions = [...missionPool].sort(() => 0.5 - Math.random());
            buildProgressBar();
            updateUI();
            nav('mission-screen');
        }

        function buildProgressBar() {
            const bar = document.getElementById('progress-bar');
            bar.innerHTML = '';
            for (let i = 0; i < 4; i++) {
                const dot = document.createElement('div');
                dot.className = 'step-dot';
                bar.appendChild(dot);
            }
        }

        function updateUI() {
            const dots = document.querySelectorAll('.step-dot');
            dots.forEach((dot, i) => {
                dot.className = 'step-dot';
                if (i < state.step) dot.classList.add('completed');
                if (i === state.step) dot.classList.add('active');
            });

            const current = state.step < 3 ? state.missions[state.step] : superMission;
            document.getElementById('m-text').innerHTML = current.t;
            document.getElementById('m-icon').innerHTML = current.i;
        }

        function completeStep() {
            state.step++;
            if (state.step === 3) {
                nav('super-alert');
                setTimeout(() => {
                    updateUI();
                    nav('mission-screen');
                }, 2500);
            } else if (state.step > 3) {
                showFinalReward();
            } else {
                updateUI();
            }
        }

        function showFinalReward() {
            state.isFinished = true;
            const titles = ["Esploratore Galattico", "Comandante Stellare", "Eroe del Cosmo"];
            const finalTitle = titles[Math.floor(Math.random() * titles.length)];
            
            document.getElementById('reward-title').innerText = finalTitle;
            
            // Salva data e diario
            localStorage.setItem('spark_play_date', new Date().toDateString());
            const history = JSON.parse(localStorage.getItem('spark_history') || '[]');
            history.unshift({ date: new Date().toLocaleDateString(), title: finalTitle });
            localStorage.setItem('spark_history', JSON.stringify(history.slice(0, 10)));

            nav('end-screen');
            startConfetti();
        }

        function openDiary() {
            const history = JSON.parse(localStorage.getItem('spark_history') || '[]');
            const container = document.getElementById('diary-content');
            container.innerHTML = history.length ? '' : '<p>Nessuna missione completata ancora. Inizia subito!</p>';
            
            history.forEach(h => {
                const entry = document.createElement('div');
                entry.style.marginBottom = "15px";
                entry.style.padding = "10px";
                entry.style.background = "rgba(255,255,255,0.05)";
                entry.style.borderRadius = "10px";
                entry.innerHTML = `<small>${h.date}</small><br><strong>${h.title}</strong>`;
                container.appendChild(entry);
            });
            nav('diary-screen');
        }

        function startConfetti() {
            const canvas = document.getElementById('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            let particles = [];
            for (let i = 0; i < 100; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    r: Math.random() * 6 + 2,
                    d: Math.random() * 100,
                    color: `hsl(${Math.random() * 360}, 70%, 60%)`
                });
            }
            function draw() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                particles.forEach(p => {
                    ctx.beginPath();
                    ctx.fillStyle = p.color;
                    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                    ctx.fill();
                    p.y += 3;
                    if (p.y > canvas.height) p.y = -10;
                });
                if (state.isFinished) requestAnimationFrame(draw);
            }
            draw();
        }

        initStars();
    </script>
</body>
</html>
