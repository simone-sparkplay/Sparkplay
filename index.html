<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes">

<title>SparkPlay</title>

<style>
:root{
  --pink:#ff5e6c;
  --pink-dark:#cc4450;
  --cyan:#4be7ff;
  --yellow:#ffe66d;
  --bg:#091127;
  --bg2:#101a3d;
  --card:#1d284d;
  --card2:#25315d;
  --white:#f7fff7;
  --muted:rgba(255,255,255,0.72);
  --muted2:rgba(255,255,255,0.52);
  --shadow:0 14px 34px rgba(0,0,0,0.30);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  margin:0;
  color:var(--white);
  font-family:'Quicksand',sans-serif;
  overflow:hidden;
  background:
    radial-gradient(circle at 50% 25%, rgba(81,109,255,0.22), transparent 34%),
    radial-gradient(circle at 50% 55%, rgba(0,210,255,0.10), transparent 46%),
    linear-gradient(180deg, #0c1531 0%, var(--bg) 100%);
}
body::before{
  content:"";
  position:fixed; inset:0;
  pointer-events:none;
  background-image:
    radial-gradient(circle at 15% 20%, rgba(255,255,255,0.16) 0 1px, transparent 1px),
    radial-gradient(circle at 80% 35%, rgba(255,255,255,0.16) 0 1px, transparent 1px),
    radial-gradient(circle at 30% 80%, rgba(255,255,255,0.12) 0 1px, transparent 1px),
    radial-gradient(circle at 60% 15%, rgba(255,255,255,0.12) 0 1px, transparent 1px),
    radial-gradient(circle at 70% 75%, rgba(255,255,255,0.14) 0 1px, transparent 1px);
  background-size: 180px 180px, 220px 220px, 200px 200px, 240px 240px, 260px 260px;
  opacity:0.6;
}
.sp-root{
  max-width:620px;
  margin:0 auto;
  height:100vh;
  display:flex;
  flex-direction:column;
  padding:env(safe-area-inset-top) 20px env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  position:relative;
}
.sp-top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:16px 18px 10px;
}
.brand{
  font-family:'Fredoka One',cursive;
  font-size:34px;
  color:var(--yellow);
  text-shadow:3px 3px 0 var(--pink);
  letter-spacing:1px;
}
.btn{
  border:none;
  cursor:pointer;
  border-radius:22px;
  font-family:'Fredoka One',cursive;
  transition:.18s ease;
}
.btn:active{transform:translateY(2px) scale(.99)}
.btn-ghost{
  background:rgba(255,255,255,0.08);
  color:white;
  padding:12px 14px;
  backdrop-filter: blur(8px);
}
.btn-danger{
  background:var(--pink);
  color:white;
  padding:12px 16px;
}
.btn-primary{
  background:linear-gradient(180deg,#ff6f7c 0%, var(--pink) 100%);
  color:white;
  padding:18px;
  width:100%;
  font-size:18px;
  box-shadow:0 8px 0 var(--pink-dark);
}
.btn-primary:active{transform:translateY(4px);box-shadow:0 3px 0 var(--pink-dark)}
.btn-secondary{
  background:linear-gradient(180deg, rgba(75,231,255,0.20) 0%, rgba(75,231,255,0.10) 100%);
  color:white;
  border:2px solid rgba(75,231,255,0.26);
  padding:18px;
  width:100%;
  font-size:16px;
}
.btn-disabled{
  opacity:.45;
  cursor:not-allowed;
}
.content-area{
  flex:1;
  display:flex;
  flex-direction:column;
  justify-content:center;
  gap:16px;
  padding:0 18px 18px;
}
.card{
  background:linear-gradient(180deg, rgba(255,255,255,0.075) 0%, rgba(255,255,255,0.055) 100%);
  border:1px solid rgba(255,255,255,0.06);
  border-radius:28px;
  padding:18px;
  box-shadow:var(--shadow);
  backdrop-filter: blur(10px);
}
.center{text-align:center}

.hero-orbit{
  width:210px;
  height:210px;
  margin:0 auto 6px;
  position:relative;
  display:flex;
  align-items:center;
  justify-content:center;
}
.hero-core{
  width:66px;height:66px;border-radius:50%;
  background:radial-gradient(circle at 50% 50%, #fff 0%, #f8f0be 40%, #fff 100%);
  box-shadow:0 0 34px rgba(255,230,109,.55);
  display:flex;align-items:center;justify-content:center;
  font-size:28px;
}
.orbit-item{
  position:absolute;
  font-size:44px;
  animation:orbit 9s linear infinite;
}
.orbit-1{animation-delay:0s}
.orbit-2{animation-delay:-3s}
.orbit-3{animation-delay:-6s}
@keyframes orbit{
  from{transform:rotate(0deg) translateX(72px) rotate(0deg)}
  to{transform:rotate(360deg) translateX(72px) rotate(-360deg)}
}

.hero-title{
  font-family:'Fredoka One',cursive;
  color:var(--yellow);
  font-size:58px;
  line-height:1;
  text-align:center;
  margin:4px 0 0;
}
.hero-sub{
  text-align:center;
  color:var(--muted);
  font-weight:800;
  font-size:17px;
  line-height:1.35;
  max-width:500px;
  margin:0 auto;
}

.progress-wrap{width:100%;max-width:500px;margin:0 auto}
.progress-row{

  margin-top:8px;margin-bottom:8px;
  font-weight:800;
}
.progress-outer{
  background:rgba(255,255,255,0.10);
  border-radius:999px;
  height:14px;
  overflow:hidden;
  box-shadow: inset 0 2px 10px rgba(0,0,0,.2);
}
.progress-inner{
  background:linear-gradient(90deg, #ffd94a 0%, var(--yellow) 100%);
  height:100%;
  width:0%;
  transition:.25s;
  border-radius:999px;
}

.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.world-card{
  border-radius:28px;
  padding:18px;
  cursor:pointer;
  text-align:left;
  background:linear-gradient(180deg, rgba(255,255,255,0.08) 0%, rgba(255,255,255,0.055) 100%);
  border:1px solid rgba(255,255,255,0.08);
  box-shadow:var(--shadow);
}
.world-card .emoji{font-size:44px}
.world-card .name{
  font-family:'Fredoka One';
  font-size:22px;
  margin-top:8px;
}
.world-card .desc{
  opacity:.78;
  margin-top:6px;
  font-weight:800;
  font-size:13px;
  line-height:1.3;
}
.world-card.disabled{
  opacity:.42;
  filter:saturate(.55);
  cursor:not-allowed;
}
.badge{
  display:inline-block;
  margin-top:10px;
  padding:6px 10px;
  border-radius:999px;
  font-weight:900;
  font-size:12px;
  background:rgba(255,255,255,0.12);
}

.select-age{

  align-items:center;
  justify-content:space-between;
  gap:16px;

  padding:22px;

.chapter-badge{

.mission-title{

  color:var(--yellow);
  line-height:1.05;

.mission-story{

  line-height:1.35;
  text-align:center;
  color:var(--white);
  margin-top:12px;
}
.objective-box{
  border:2px dashed rgba(75,231,255,.45);
  border-radius:22px;
  padding:14px;
  text-align:center;
  font-weight:900;
  color:var(--cyan);
  background:rgba(75,231,255,0.05);

.steps-list{

.step-card{

  padding:16px;

.step-card.active{

.controls-row{display:flex;gap:12px}

  display:flex; flex-direction:column; align-items:center; justify-content:center;

    radial-gradient(circle at 50% 35%, rgba(75,231,255,0.16) 0%, transparent 34%),

  color: var(--white);
}
#splash-screen .logo{

  font-size:46px;
  color:var(--yellow);
  text-shadow:3px 3px var(--pink);
  margin-top:10px;
}
#splash-screen .sub{
  opacity:0.72;
  margin-top:6px;
  font-weight:800;
}

#diario-modal{
  position:fixed; inset:0; z-index:4000;
  display:none; flex-direction:column; padding:28px 18px;
  background:linear-gradient(180deg, #101a3b, #091127);
  overflow-y:auto;
}
.scheda-ricordo{
  background:rgba(255,255,255,0.08);
  padding:18px;
  border-radius:24px;
  margin-bottom:12px;
  border-left:8px solid var(--cyan);
  display:flex;
  gap:14px;
  align-items:center;
}
.emoji-diario{font-size:28px;opacity:.95}
.testo-diario b{display:block;font-size:18px;color:var(--yellow)}
.testo-diario small{opacity:.62;font-size:12px}

#overlay-success{
  position:fixed; inset:0; z-index:4500;
  display:none; align-items:center; justify-content:center;
  background:rgba(10,17,40,0.92);
}
.messaggio-vittoria{
  font-family:'Fredoka One';
  font-size:48px;
  color:var(--yellow);
  text-shadow:4px 4px var(--pink);
  text-align:center;
}
.cascata{
  position:absolute;
  top:-20px;
  pointer-events:none;
  animation:caduta 2s linear forwards;
  font-size:28px;
}
@keyframes caduta{
  to{transform:translateY(110vh) rotate(360deg);opacity:0}
}

.helper-text{
  opacity:.62;
  font-weight:800;
  font-size:12px;
  text-align:center;
}
.tiny-pill{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  padding:6px 10px;
  border-radius:999px;
  font-weight:900;
  font-size:11px;
  background:rgba(255,255,255,0.1);
}
input[type="text"], input[type="number"]{
  font-family:'Quicksand',sans-serif;
}

@media (max-width:440px){
  .hero-title{font-size:50px}
  .brand{font-size:30px}
  .mission-title{font-size:26px}
}
</style>
</head>

/* ========= SUONI ========= */
function playTone(freq=520, duration=0.08, type="sine", volume=0.02){
  if(!state.audio) return;
  try{
    const AudioCtx = window.AudioContext || window.webkitAudioContext;
    if(!AudioCtx) return;
    if(!window.__sparkCtx) window.__sparkCtx = new AudioCtx();
    const ctx = window.__sparkCtx;
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = type;
    osc.frequency.value = freq;
    gain.gain.value = volume;
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start();
    gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + duration);
    osc.stop(ctx.currentTime + duration);
  }catch(e){}
}
function sfxClick(){ playTone(560, 0.05, "triangle", 0.015); }
function sfxSuccess(){
  playTone(660, 0.08, "triangle", 0.02);
  setTimeout(()=>playTone(830, 0.10, "triangle", 0.02), 90);
  setTimeout(()=>playTone(990, 0.12, "triangle", 0.02), 190);
}

/* ========= MISSION BUILDER ========= */
function buildMissionByAge(m, eta){
  const cards = m.cards[eta] || [];
  const steps = [];

  if(m.chapter){
    steps.push({ icon:"✨", label:m.chapter, text:"" });
  }

  cards.forEach(c => steps.push(c));

  steps.push({ icon:"🏆", label:"Successo", text:m.success || "Missione completata!" });

  return {
    t: m.t,
    s: m.s,
    o: m.o,
    steps
  };
}

function getTodayKey(){
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
}
function limiteOggi(){ return state.oggiLimite + state.extraSbloccate; }

function caricaPreferenze(){
  state.audio = localStorage.getItem("sparkplay_audio") === "1";
  const d = localStorage.getItem("sparkplay_diario");
  state.diario = d ? JSON.parse(d) : [];
}
function salvaPreferenze(){
  localStorage.setItem("sparkplay_audio", state.audio ? "1" : "0");
}

function caricaStatoGiorno(){
  state.oggiKey = getTodayKey();
  const saved = JSON.parse(localStorage.getItem("sparkplay_day") || "{}");
  if(saved.key === state.oggiKey){
    state.oggiFatte = Number(saved.oggiFatte || 0);
    state.extraSbloccate = Number(saved.extraSbloccate || 0);
    state.bonusUsatoOggi = !!saved.bonusUsatoOggi;
    state.specialeFattaOggi = !!saved.specialeFattaOggi;
  } else {
    state.oggiFatte = 0;
    state.extraSbloccate = 0;
    state.bonusUsatoOggi = false;
    state.specialeFattaOggi = false;
    salvaStatoGiorno();
  }
}
function salvaStatoGiorno(){
  localStorage.setItem("sparkplay_day", JSON.stringify({
    key: state.oggiKey,
    oggiFatte: state.oggiFatte,
    extraSbloccate: state.extraSbloccate,
    bonusUsatoOggi: state.bonusUsatoOggi,
    specialeFattaOggi: state.specialeFattaOggi
  }));
}

function caricaCampagna(){
  const saved = JSON.parse(localStorage.getItem("sparkplay_campaign") || "{}");
  const w = saved[state.world];
  state.storyIndex = Number.isFinite(w?.storyIndex) ? w.storyIndex : 0;
}
function salvaCampagna(){
  const saved = JSON.parse(localStorage.getItem("sparkplay_campaign") || "{}");
  saved[state.world] = { storyIndex: state.storyIndex };
  localStorage.setItem("sparkplay_campaign", JSON.stringify(saved));
}

function salvaDiario(){
  localStorage.setItem("sparkplay_diario", JSON.stringify(state.diario));
}

/* ========= FX ========= */
function creaStelle(n=18){
  for(let i=0;i<n;i++){
    const el = document.createElement("div");
    el.className = "cascata";
    el.textContent = "✨";
    el.style.left = (Math.random()*100) + "vw";
    el.style.animationDuration = (1.2 + Math.random()*1.4) + "s";
    document.body.appendChild(el);
    setTimeout(()=>el.remove(), 2200);
  }
}
function vibra(){
  try{ if(navigator.vibrate) navigator.vibrate([150,70,150]); }catch(e){}
}

/* ========= UI HELPERS ========= */
function progressPercent(){
  return Math.min(100, (state.oggiFatte / Math.max(1, limiteOggi())) * 100);
}
function homeHint(){
  if(state.oggiFatte < limiteOggi()){
    return "Missioni con oggetti di casa. Sicure. Creative. Subito pronte.";
  }
  if(!state.bonusUsatoOggi){
    return "Hai finito le missioni di oggi. Il genitore può sbloccare +3 una sola volta.";
  }
  return "Hai finito le missioni di oggi. Torna domani per continuare.";
}
function renderStepCard(step, i){
  const isActive = i === state.passo;
  return `
    <div class="step-card ${isActive ? "active" : ""}">
      <div class="step-icon">${step.icon}</div>

        <div class="step-title">${step.label}</div>
        ${step.text ? `<div class="step-text">${step.text}</div>` : ``}

}

/* ========= AZIONI ========= */
window.home = ()=>{
  sfxClick();
  state.fsm = "INIZIO";
  state.passo = 0;
  state.missioneAttuale = null;
  disegna();
};

window.vaiMondi = ()=>{
  sfxClick();
  state.fsm = state.oggiFatte >= limiteOggi() ? "SCELTA_GENITORE" : "MONDI";
  disegna();
};

window.scegliMondo = (w)=>{
  if(w !== "spazio") return;
  sfxClick();
  state.world = w;
  caricaCampagna();
  state.fsm = "ETA";
  disegna();
};

window.scegliEta = (eta)=>{
  sfxClick();
  state.eta = eta;
  if(state.oggiFatte >= limiteOggi()){
    state.fsm = "SCELTA_GENITORE";
    disegna();
    return;
  }
  proproxima();
};

window.toggleAudio = ()=>{
  state.audio = !state.audio;
  salvaPreferenze();
  if(state.audio) playTone(720, 0.08, "triangle", 0.02);
  disegna();
};

window.apriDiario = ()=>{
  sfxClick();
  const l = document.getElementById("lista-diario");
  l.innerHTML = state.diario.length
    ? state.diario.map(m => `
      <div class="scheda-ricordo">
        <div class="emoji-diario">📖</div>
        <div class="testo-diario">
          <small>${m.data}</small>
          <b>${m.titolo}</b>
        </div>
      </div>`).join("")
    : "<p class='center' style='opacity:.65; font-weight:900;'>Il diario è vuoto.</p>";
  document.getElementById("diario-modal").style.display = "flex";
};

window.chiudiDiario = ()=>{
  sfxClick();
  document.getElementById("diario-modal").style.display = "none";
};

window.apriGate = (tipo)=>{
  sfxClick();
  state.gateTipo = tipo;
  state.gateErrore = "";
  state.fsm = "GATE";
  disegna();
};

window.annullaGate = ()=>{
  sfxClick();
  state.fsm = "SCELTA_GENITORE";
  disegna();
};

window.verificaGate = ()=>{
  const v = (document.getElementById("gate-input")?.value || "").trim();
  if(v !== "10"){
    state.gateErrore = "Risposta errata. Riprova 🙂";
    disegna();
    return;
  }

  sfxClick();

  if(state.gateTipo === "ALTRE"){
    if(state.bonusUsatoOggi){
      state.gateErrore = "Bonus già usato oggi. Torna domani 🙂";
      disegna();
      return;
    }
    state.bonusUsatoOggi = true;
    state.extraSbloccate = 3;
    salvaStatoGiorno();
    proproxima();
    return;
  }

  if(state.gateTipo === "SPECIALE"){
    if(state.specialeFattaOggi){
      state.gateErrore = "Missione speciale già fatta oggi.";
      disegna();
      return;
    }
    state.specialeFattaOggi = true;
    salvaStatoGiorno();
    state.missioneIsSpeciale = true;
    const m = DB.speciale;
    state.missioneAttuale = {
      t: m.t,
      s: m.s,
      o: m.o,
      steps: [...m.cards[state.eta], { icon:"🏆", label:"Successo", text:m.success }]
    };
    state.passo = 0;
    state.fsm = "GIOCO";
    disegna();
  }
};

function proproxima(){
  if(!state.eta){
    state.fsm = "ETA";
    disegna();
    return;
  }
  if(state.oggiFatte >= limiteOggi()){
    state.fsm = "SCELTA_GENITORE";
    disegna();
    return;
  }

  const key = SPACE_ORDER[state.storyIndex % SPACE_ORDER.length];
  const m = DB.spazio[key];

  state.missioneIsSpeciale = false;
  state.missioneAttuale = buildMissionByAge(m, state.eta);
  state.passo = 0;
  state.fsm = "GIOCO";
  disegna();
}

window.precedente = ()=>{
  if(state.passo <= 0) return;
  sfxClick();
  state.passo--;
  disegna();
};

window.successivo = ()=>{
  const m = state.missioneAttuale;
  if(state.passo < m.steps.length - 1){
    sfxClick();
    state.passo++;
    disegna();
    return;
  }

  document.getElementById("overlay-success").style.display = "flex";
  creaStelle(22);
  vibra();
  sfxSuccess();

  state.diario.unshift({
    titolo: m.t,
    data: new Date().toLocaleDateString("it-IT")
  });
  salvaDiario();

  setTimeout(()=>{
    document.getElementById("overlay-success").style.display = "none";

    if(state.missioneIsSpeciale){
      state.fsm = "SCELTA_GENITORE";
      disegna();
      return;
    }

    state.oggiFatte++;
    salvaStatoGiorno();

    state.storyIndex++;
    salvaCampagna();

    if(state.oggiFatte >= limiteOggi()){
      state.fsm = "SCELTA_GENITORE";
      disegna();
      return;
    }

    proproxima();
  }, 1600);
};

/* ========= BOOTSTRAP ========= */
caricaPreferenze();
caricaStatoGiorno();
caricaCampagna();

window.addEventListener("load", ()=>{
  const splash = document.getElementById("splash-screen");
  if(splash) setTimeout(()=>{ splash.style.display = "none"; }, 900);
});

disegna();
</script>
</body>
</html>
