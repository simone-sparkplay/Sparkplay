<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>SparkPlay</title>
<style>
:root{
  --bg-1:#060816;
  --bg-2:#0f1430;
  --bg-3:#1d0f3f;
  --card:rgba(255,255,255,.08);
  --card-2:rgba(255,255,255,.06);
  --line:rgba(255,255,255,.12);
  --text:#eef2ff;
  --muted:rgba(238,242,255,.62);
  --purple:#7c3aed;
  --purple-2:#a855f7;
  --purple-3:#c084fc;
  --gold:#ffd54a;
  --gold-2:#ffb300;
  --cyan:#67e8f9;
  --green:#34d399;
  --danger:#ff6b7d;
  --shadow:0 18px 50px rgba(0,0,0,.38);
  --shadow-soft:0 8px 24px rgba(0,0,0,.25);
  --r-xl:30px;
  --r-lg:22px;
  --r-md:16px;
  --safe-top:env(safe-area-inset-top, 0px);
  --safe-bottom:env(safe-area-inset-bottom, 0px);
  --font:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{
  margin:0;
  width:100%;
  height:100%;
  overflow:hidden;
  font-family:var(--font);
  color:var(--text);
  background:
    radial-gradient(circle at 20% 0%, rgba(124,58,237,.28), transparent 28%),
    radial-gradient(circle at 100% 80%, rgba(255,181,71,.16), transparent 30%),
    linear-gradient(180deg,var(--bg-2),var(--bg-1) 58%, #04050f 100%);
}
body{position:relative}
button,input{font:inherit}
#app{
  position:relative;
  width:100%;
  height:100%;
  max-width:520px;
  margin:0 auto;
  overflow:hidden;
}
.aurora,.stars,.fx-layer{
  position:fixed;
  inset:0;
  pointer-events:none;
}
.aurora{z-index:0;overflow:hidden}
.blob{
  position:absolute;
  border-radius:50%;
  filter:blur(80px);
  opacity:.18;
  animation:drift 18s ease-in-out infinite alternate;
}
.blob.b1{width:340px;height:340px;left:-90px;top:-80px;background:radial-gradient(circle,#7c3aed,transparent 65%)}
.blob.b2{width:280px;height:280px;right:-70px;bottom:0;background:radial-gradient(circle,#22d3ee,transparent 65%);animation-delay:-6s}
.blob.b3{width:220px;height:220px;left:35%;top:40%;background:radial-gradient(circle,#ffb300,transparent 65%);opacity:.09;animation-delay:-10s}
@keyframes drift{
  0%{transform:translate3d(0,0,0) scale(1)}
  50%{transform:translate3d(22px,-18px,0) scale(1.08)}
  100%{transform:translate3d(-18px,14px,0) scale(.96)}
}
.stars{z-index:0;overflow:hidden}
.star{
  position:absolute;
  border-radius:50%;
  background:#fff;
  opacity:0;
  animation:twinkle var(--d,3s) ease-in-out infinite var(--delay,0s);
}
@keyframes twinkle{
  0%,100%{opacity:0}
  50%{opacity:var(--o,.7)}
}
.fx-layer{z-index:25;overflow:hidden}
.screen{
  position:absolute;
  inset:0;
  display:none;
  flex-direction:column;
  padding:calc(18px + var(--safe-top)) 18px calc(22px + var(--safe-bottom));
  overflow-y:auto;
  -webkit-overflow-scrolling:touch;
  z-index:1;
  background:linear-gradient(180deg, rgba(7,9,24,.02), rgba(7,9,24,.22));
}
.screen.active{
  display:flex;
  animation:screenIn .34s cubic-bezier(.22,1,.36,1);
}
@keyframes screenIn{
  from{opacity:0;transform:translateY(16px) scale(.985)}
  to{opacity:1;transform:translateY(0) scale(1)}
}
.topbar{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  margin-bottom:18px;
  position:relative;
  z-index:2;
}
.leftpack{display:flex;align-items:center;gap:10px}
.icon-btn{
  width:46px;
  height:46px;
  border:none;
  border-radius:16px;
  background:rgba(255,255,255,.08);
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  box-shadow:var(--shadow-soft), inset 0 0 0 1px rgba(255,255,255,.08);
  cursor:pointer;
  transition:transform .14s ease, background .14s ease;
}
.icon-btn:active{transform:scale(.9);background:rgba(255,255,255,.16)}
.icon-btn svg{width:22px;height:22px;display:block}
.xp-wrap{
  min-width:155px;
  display:flex;
  flex-direction:column;
  gap:6px;
}
.xp-head{
  display:flex;
  align-items:center;
  justify-content:space-between;
  font-size:11px;
  font-weight:800;
  letter-spacing:.08em;
  text-transform:uppercase;
}
.xp-head .label{color:var(--gold)}
.xp-track{
  width:100%;
  height:10px;
  background:rgba(255,255,255,.1);
  border-radius:999px;
  overflow:hidden;
  box-shadow:inset 0 0 0 1px rgba(255,255,255,.06);
}
.xp-fill{
  height:100%;
  width:0%;
  border-radius:999px;
  background:linear-gradient(90deg, var(--gold), var(--gold-2));
  box-shadow:0 0 18px rgba(255,193,7,.5);
  position:relative;
  transition:width .8s cubic-bezier(.34,1.56,.64,1);
}
.xp-fill::after{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.38),transparent);
  animation:shine 2.2s linear infinite;
}
@keyframes shine{
  from{transform:translateX(-130%)}
  to{transform:translateX(130%)}
}
.hero{
  flex:1;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
  gap:18px;
}
.logo-zone{
  position:relative;
  width:160px;
  height:160px;
  display:flex;
  align-items:center;
  justify-content:center;
  margin-bottom:8px;
}
.ring{
  position:absolute;
  inset:0;
  border-radius:50%;
  border:2px solid rgba(255,255,255,.08);
  animation:pulseRing 3.2s ease-in-out infinite;
}
.ring.r2{inset:-18px;border-width:1px;animation-delay:.8s}
.ring.r3{inset:-38px;border-width:1px;opacity:.5;animation-delay:1.6s}
@keyframes pulseRing{
  0%,100%{transform:scale(1);opacity:.24}
  50%{transform:scale(1.08);opacity:.6}
}
.orbit{
  position:absolute;
  inset:0;
  animation:spin 6s linear infinite;
}
.orbit .dot{
  position:absolute;
  top:50%;
  left:50%;
  width:12px;
  height:12px;
  margin:-6px;
  background:var(--gold);
  border-radius:50%;
  box-shadow:0 0 16px rgba(255,213,74,.95);
  transform:translateX(72px);
}
@keyframes spin{to{transform:rotate(360deg)}}
.logo-box{
  width:122px;
  height:122px;
  border-radius:34px;
  background:linear-gradient(145deg,var(--purple-2),var(--purple));
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:60px;
  box-shadow:0 18px 44px rgba(124,58,237,.55), inset 0 1px 0 rgba(255,255,255,.22);
  animation:floatY 4s ease-in-out infinite;
  position:relative;
  z-index:2;
}
@keyframes floatY{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-10px)}
}
.title{
  font-size:50px;
  line-height:1;
  letter-spacing:-.04em;
  font-weight:950;
  margin:0;
  background:linear-gradient(100deg,#fff 18%,#e9d5ff 56%,#ffd54a 100%);
  -webkit-background-clip:text;
  background-clip:text;
  -webkit-text-fill-color:transparent;
  filter:drop-shadow(0 2px 10px rgba(255,213,74,.14));
}
.subtitle{
  max-width:300px;
  margin:0;
  font-size:15px;
  line-height:1.55;
  color:var(--muted);
}
.actions{
  width:100%;
  display:flex;
  flex-direction:column;
  gap:12px;
}
.btn{
  width:100%;
  border:none;
  border-radius:18px;
  padding:18px 18px;
  font-size:17px;
  font-weight:850;
  cursor:pointer;
  transition:transform .12s ease, filter .12s ease, opacity .12s ease;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  position:relative;
  overflow:hidden;
}
.btn:active{transform:scale(.97)}
.btn:disabled{opacity:.45;pointer-events:none}
.btn::before{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(180deg,rgba(255,255,255,.16),transparent 55%);
  pointer-events:none;
}
.btn.primary{
  color:#fff;
  background:linear-gradient(135deg,var(--purple-2),var(--purple));
  box-shadow:0 16px 40px rgba(124,58,237,.36);
}
.btn.gold{
  color:#140b00;
  background:linear-gradient(135deg,#ffd54a,#ffb300);
  box-shadow:0 14px 36px rgba(255,179,0,.34);
}
.btn.ghost{
  color:#fff;
  background:rgba(255,255,255,.08);
  box-shadow:inset 0 0 0 1px rgba(255,255,255,.1);
}
.page-title{
  font-size:28px;
  line-height:1.1;
  letter-spacing:-.03em;
  font-weight:950;
  margin:2px 0 6px;
}
.page-sub{
  font-size:14px;
  color:var(--muted);
  margin:0 0 18px;
  line-height:1.5;
}
.world-list,.mission-list,.diary-list{display:flex;flex-direction:column;gap:14px}
.world-card{
  position:relative;
  overflow:hidden;
  border-radius:26px;
  padding:20px;
  display:flex;
  align-items:center;
  gap:16px;
  cursor:pointer;
  box-shadow:var(--shadow);
  border:1px solid rgba(255,255,255,.14);
  transition:transform .16s ease, filter .16s ease;
}
.world-card:active{transform:scale(.98)}
.world-card::after{
  content:"";
  position:absolute;
  top:0;
  left:0;
  right:0;
  height:1px;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.25),transparent);
}
.world-card.spazio{background:linear-gradient(145deg,#0e1a56,#1c2f89 55%,#0b1b53)}
.world-card.magia{background:linear-gradient(145deg,#1a0a3d,#5f1bc4 55%,#27086e)}
.world-card.detective{background:linear-gradient(145deg,#241300,#6f4800 55%,#362000)}
.world-icon{
  flex:0 0 74px;
  width:74px;
  height:74px;
  border-radius:22px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:42px;
  background:rgba(255,255,255,.09);
  box-shadow:inset 0 0 0 1px rgba(255,255,255,.12);
}
.world-info{flex:1}
.world-name{
  font-size:22px;
  font-weight:950;
  margin-bottom:4px;
  letter-spacing:.04em;
}
.world-desc{
  font-size:13px;
  color:rgba(255,255,255,.66);
  line-height:1.4;
}
.world-status{
  margin-top:8px;
  font-size:11px;
  font-weight:800;
  letter-spacing:.06em;
  text-transform:uppercase;
  color:rgba(255,255,255,.52);
}
.world-arrow{
  width:38px;
  height:38px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  background:rgba(255,255,255,.11);
  font-size:18px;
}
.progress-row{
  display:flex;
  align-items:center;
  gap:10px;
  margin:0 0 18px;
}
.progress-dots{display:flex;gap:8px}
.progress-dot{
  width:13px;
  height:13px;
  border-radius:50%;
  background:rgba(255,255,255,.14);
  border:1px solid rgba(255,255,255,.08);
}
.progress-dot.done{
  background:var(--gold);
  box-shadow:0 0 12px rgba(255,213,74,.6);
}
.progress-dot.active{
  background:var(--purple-3);
  box-shadow:0 0 12px rgba(192,132,252,.6);
  animation:pulseDot 1.6s ease-in-out infinite;
}
@keyframes pulseDot{
  0%,100%{transform:scale(1)}
  50%{transform:scale(1.14)}
}
.progress-label{
  margin-left:auto;
  font-size:12px;
  font-weight:800;
  color:rgba(255,255,255,.5);
}
.mission-card{
  border-radius:20px;
  background:var(--card);
  box-shadow:var(--shadow-soft);
  border:1px solid var(--line);
  display:flex;
  align-items:center;
  gap:14px;
  padding:15px 16px;
  transition:transform .14s ease, background .14s ease;
  position:relative;
  overflow:hidden;
}
.mission-card:active{transform:scale(.98)}
.mission-card::after{
  content:"";
  position:absolute;
  top:0;
  left:0;
  right:0;
  height:1px;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.16),transparent);
}
.mission-card.done{opacity:.42;pointer-events:none}
.mission-card.locked{opacity:.5;pointer-events:none;filter:saturate(.6)}
.mission-card.active-card{
  box-shadow:0 0 0 1px rgba(168,85,247,.32), 0 16px 40px rgba(124,58,237,.22);
}
.mission-num{
  flex:0 0 42px;
  width:42px;
  height:42px;
  border-radius:14px;
  display:flex;
  align-items:center;
  justify-content:center;
  background:linear-gradient(135deg,var(--purple-2),var(--purple));
  color:#fff;
  font-weight:950;
  box-shadow:0 8px 20px rgba(124,58,237,.36);
}
.mission-num.done{background:linear-gradient(135deg,#293045,#171d2d);box-shadow:none}
.mission-body{flex:1}
.mission-title{
  font-size:15px;
  font-weight:850;
  margin-bottom:3px;
  line-height:1.2;
}
.mission-desc{
  font-size:12px;
  color:rgba(255,255,255,.52);
  line-height:1.35;
}
.mission-tag{
  display:inline-block;
  margin-top:6px;
  padding:3px 8px;
  border-radius:999px;
  font-size:10px;
  font-weight:900;
  letter-spacing:.05em;
  text-transform:uppercase;
  background:rgba(52,211,153,.12);
  color:#8ff0c4;
  border:1px solid rgba(52,211,153,.18);
}
.mission-arrow{font-size:18px;color:rgba(255,255,255,.32)}
.special-card{
  position:relative;
  overflow:hidden;
  border-radius:26px;
  margin-top:8px;
  background:linear-gradient(145deg,#180735,#4c178a 55%,#2a0d5c);
  box-shadow:0 18px 44px rgba(255,179,0,.18);
  border:2px solid rgba(255,213,74,.6);
}
.special-card::before{
  content:"";
  position:absolute;
  inset:0;
  background:radial-gradient(circle at 50% 0%, rgba(255,213,74,.16), transparent 55%);
  pointer-events:none;
}
.special-card-inner{
  padding:24px 20px;
  text-align:center;
  position:relative;
  z-index:1;
}
.special-tag{
  position:absolute;
  top:10px;
  right:10px;
  padding:4px 10px;
  border-radius:999px;
  background:rgba(255,213,74,.16);
  color:var(--gold);
  font-size:10px;
  font-weight:950;
  letter-spacing:.08em;
  text-transform:uppercase;
  border:1px solid rgba(255,213,74,.3);
}
.special-icon{
  font-size:46px;
  display:block;
  margin-bottom:8px;
  animation:floatY 4s ease-in-out infinite;
}
.special-title{
  font-size:20px;
  font-weight:950;
  color:var(--gold);
  margin-bottom:6px;
}
.special-sub{
  font-size:13px;
  color:rgba(255,255,255,.64);
  line-height:1.5;
  margin-bottom:16px;
}
.detail-hero{
  display:flex;
  flex-direction:column;
  align-items:center;
  text-align:center;
  gap:10px;
  margin-bottom:18px;
}
.detail-pill{
  padding:6px 14px;
  border-radius:999px;
  background:rgba(255,255,255,.09);
  box-shadow:inset 0 0 0 1px rgba(255,255,255,.1);
  font-size:11px;
  font-weight:900;
  letter-spacing:.08em;
  text-transform:uppercase;
  color:rgba(255,255,255,.76);
}
.detail-icon-wrap{
  width:116px;
  height:116px;
  border-radius:32px;
  display:flex;
  align-items:center;
  justify-content:center;
  background:radial-gradient(circle at 30% 30%, rgba(192,132,252,.3), rgba(124,58,237,.12));
  box-shadow:0 18px 42px rgba(124,58,237,.24), inset 0 0 0 1px rgba(255,255,255,.1);
  position:relative;
  animation:floatY 4s ease-in-out infinite;
}
.detail-icon-wrap::after{
  content:"";
  position:absolute;
  inset:-8px;
  border-radius:38px;
  border:1px dashed rgba(255,255,255,.16);
  animation:spin 13s linear infinite;
}
.detail-emoji{
  font-size:64px;
  position:relative;
  z-index:1;
}
.detail-title{
  font-size:30px;
  line-height:1.06;
  letter-spacing:-.03em;
  font-weight:950;
  margin:0;
}
.detail-intro{
  max-width:320px;
  font-size:15px;
  color:var(--muted);
  line-height:1.55;
  margin:0;
}
.block{
  width:100%;
  border-radius:22px;
  background:var(--card-2);
  box-shadow:var(--shadow-soft);
  border:1px solid var(--line);
  padding:18px;
  margin-bottom:14px;
  position:relative;
  overflow:hidden;
}
.block::after{
  content:"";
  position:absolute;
  top:0;
  left:0;
  right:0;
  height:1px;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.16),transparent);
}
.block-label{
  display:flex;
  align-items:center;
  gap:8px;
  margin-bottom:12px;
  font-size:11px;
  font-weight:950;
  letter-spacing:.1em;
  text-transform:uppercase;
}
.block-line{
  width:3px;
  height:14px;
  border-radius:4px;
}
.items{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
}
.item-chip{
  border-radius:999px;
  padding:7px 12px;
  background:rgba(255,213,74,.1);
  border:1px solid rgba(255,213,74,.18);
  color:#fff1aa;
  font-size:13px;
  font-weight:700;
}
.steps{
  display:flex;
  flex-direction:column;
  gap:12px;
}
.step{
  display:flex;
  gap:12px;
  align-items:flex-start;
}
.step-bullet{
  flex:0 0 32px;
  width:32px;
  height:32px;
  border-radius:12px;
  background:linear-gradient(135deg,var(--purple-2),var(--purple));
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:14px;
  font-weight:950;
  box-shadow:0 8px 18px rgba(124,58,237,.28);
}
.step-text{
  font-size:14px;
  line-height:1.56;
  color:rgba(255,255,255,.9);
  padding-top:5px;
}
.reward-overlay,.gate-overlay{
  position:fixed;
  inset:0;
  z-index:30;
  display:none;
  align-items:center;
  justify-content:center;
  padding:20px;
  background:rgba(0,0,0,.86);
  backdrop-filter:blur(8px);
}
.reward-card{
  width:100%;
  max-width:370px;
  border-radius:28px;
  padding:36px 24px 26px;
  text-align:center;
  background:linear-gradient(160deg,#220d53,#0f1233);
  border:2px solid rgba(255,213,74,.7);
  box-shadow:0 0 100px rgba(255,179,0,.16), 0 26px 70px rgba(0,0,0,.56);
  animation:rewardIn .42s cubic-bezier(.34,1.56,.64,1);
  position:relative;
  overflow:hidden;
}
.reward-card::before{
  content:"";
  position:absolute;
  inset:0;
  background:radial-gradient(circle at 50% 0%, rgba(255,213,74,.14), transparent 58%);
  pointer-events:none;
}
@keyframes rewardIn{
  0%{opacity:0;transform:scale(.82) translateY(28px)}
  70%{opacity:1;transform:scale(1.05) translateY(-4px)}
  100%{opacity:1;transform:scale(1) translateY(0)}
}
.reward-icon{
  font-size:84px;
  display:block;
  margin-bottom:8px;
  animation:floatY 3.6s ease-in-out infinite;
}
.reward-title{
  font-size:30px;
  line-height:1.06;
  font-weight:950;
  color:var(--gold);
  margin-bottom:8px;
}
.reward-msg{
  font-size:14px;
  line-height:1.55;
  color:rgba(255,255,255,.7);
  margin-bottom:18px;
}
.reward-xp{
  display:inline-block;
  padding:12px 22px;
  border-radius:16px;
  background:linear-gradient(135deg, rgba(255,213,74,.16), rgba(255,179,0,.1));
  border:1px solid rgba(255,213,74,.32);
  color:var(--gold);
  font-size:26px;
  font-weight:950;
  margin-bottom:20px;
  box-shadow:0 0 26px rgba(255,179,0,.12);
  animation:popNum .7s cubic-bezier(.34,1.56,.64,1);
}
@keyframes popNum{
  0%{opacity:0;transform:scale(.55)}
  70%{opacity:1;transform:scale(1.12)}
  100%{opacity:1;transform:scale(1)}
}
.burst{
  position:absolute;
  inset:0;
  pointer-events:none;
  overflow:hidden;
}
.spark,.conf{
  position:absolute;
  border-radius:50%;
  animation:burstOut 1s ease-out forwards;
}
.conf{
