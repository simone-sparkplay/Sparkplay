<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SparkPlay</title>
    <style>
        :root {
            --bg-color: #0f1218;
            --card-bg: #1a1f26;
            --accent-soft: #9daaf2; /* Blu polvere calmo */
            --gold-soft: #e5d392;   /* Oro tenue, non neon */
            --text-main: #f0f2f5;
            --text-dim: #94a3b8;
            --transition-smooth: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
        }

        html, body {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: var(--bg-color); 
            color: var(--text-main);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden;
        }

        body { display: flex; justify-content: center; align-items: center; }

        /* --- Schermi Minimali --- */
        .screen {
            display: none; flex-direction: column; align-items: center; justify-content: center;
            width: 100%; height: 100%; padding: 60px 30px; text-align: center;
            position: absolute; opacity: 0;
            transition: opacity var(--transition-smooth);
            pointer-events: none;
        }

        .screen.active { 
            display: flex; opacity: 1; pointer-events: auto; z-index: 10; 
        }

        /* --- Tipografia Montessori --- */
        h1 { 
            font-size: 2.8rem; font-weight: 300; letter-spacing: 4px; 
            margin: 0; color: var(--text-main); 
        }

        h2 { 
            font-size: 1.6rem; font-weight: 400; letter-spacing: 1px; 
            margin-bottom: 40px; color: var(--text-dim);
        }

        p { 
            font-size: 1.4rem; line-height: 1.6; font-weight: 300;
            margin: 20px 0; color: var(--text-main); 
        }

        /* --- UI Status (Memory) --- */
        .badge-status {
            font-size: 0.9rem; font-weight: 400; letter-spacing: 2px;
            margin-top: 20px; color: var(--accent-soft);
            text-transform: uppercase;
        }

        .no-badge { opacity: 0.4; color: var(--text-dim); }

        /* --- Bottoni Moderni --- */
        .btn {
            background: transparent;
            color: var(--text-main);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 12px;
            padding: 22px 40px;
            font-size: 1.1rem; font-weight: 400; letter-spacing: 2px;
            cursor: pointer; transition: all 0.3s ease;
            width: 85%; max-width: 320px;
            text-transform: uppercase;
            margin-top: 40px;
        }

        .btn:active { 
            background: rgba(255,255,255,0.05);
            transform: translateY(2px);
            border-color: var(--accent-soft);
        }

        .btn-primary {
            background: var(--text-main);
            color: var(--bg-color);
            border: none;
        }

        .btn-back {
            border: none; font-size: 0.9rem; color: var(--text-dim);
            margin-top: 20px; padding: 10px;
        }

        /* --- Card Mondo --- */
        .world-card {
            background: var(--card-bg);
            border-radius: 24px; padding: 60px 40px;
            width: 100%; max-width: 320px;
            transition: transform 0.3s ease;
        }

        .icon-large { 
            font-size: 4rem; display: block; margin-bottom: 25px; 
            opacity: 0.9; filter: grayscale(0.2);
        }

        /* --- Reward Box --- */
        .reward-box {
            padding: 30px; margin: 30px 0;
            border-top: 1px solid rgba(255,255,255,0.1);
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .badge-display {
            color: var(--gold-soft); font-size: 1.5rem;
            font-weight: 300; letter-spacing: 1px;
        }

        /* --- Progress --- */
        .progress-indicator {
            font-size: 0.8rem; letter-spacing: 2px;
            color: var(--text-dim); text-transform: uppercase;
            margin-bottom: 40px;
        }
    </style>
</head>
<body>

    <section id="home" class="screen active">
        <div>
            <h1>SPARKPLAY</h1>
            <div id="home-badge-display" class="badge-status no-badge">Esplorazione non iniziata</div>
        </div>
        <button class="btn btn-primary" onclick="nav('world-select')">Inizia</button>
    </section>

    <section id="world-select" class="screen">
        <h2>Seleziona Ambiente</h2>
        <div class="world-card" onclick="startNewSession()">
            <span class="icon-large">🚀</span>
            <div style="letter-spacing: 3px; font-weight: 300;">SPAZIO</div>
        </div>
        <button class="btn btn-back" onclick="nav('home')">Chiudi</button>
    </section>

    <section id="mission" class="screen">
        <div id="progress" class="progress-indicator">Missione 1 / 3</div>
        <div id="mission-ui">
            <span id="mission-icon" class="icon-large">🚀</span>
            <p id="mission-text">...</p>
        </div>
        <button class="btn btn-primary" onclick="handleComplete()">Completata</button>
    </section>

    <section id="alert-screen" class="screen">
        <span class="icon-large">🌠</span>
        <h1 style="font-size: 1.8rem; letter-spacing: 5px;">MISSIONE SPECIALE</h1>
    </section>

    <section id="end-screen" class="screen">
        <div class="reward-box">
            <h2 style="margin-bottom: 10px;">Obiettivo Raggiunto</h2>
            <div id="badge-name-end" class="badge-display">Comandante</div>
        </div>
        <p style="font-size: 1rem; color: var(--text-dim);">L'esplorazione prosegue domani.</p>
        <button class="btn btn-primary" onclick="resetAndHome()">Menu Principale</button>
    </section>

    <script>
        let lastBadge = "";

        const missionPool = [
            { text: "Cerca un oggetto <b>rosso</b> simile a Marte.", icon: "☄️" },
            { text: "Esegui 5 movimenti lenti verso l'alto.", icon: "👨‍🚀" },
            { text: "Trova una forma <b>rotonda</b> come la Luna.", icon: "🌕" },
            { text: "Rimani in silenzio per 10 secondi spaziali.", icon: "🛸" },
            { text: "Traccia una stella nell'aria con la mano.", icon: "✨" },
            { text: "Cammina con cura, come se non ci fosse gravità.", icon: "👨‍🚀" }
        ];

        const badges = ["Esploratore Spaziale", "Comandante", "Eroe Galattico", "Pilota Stellare"];
        const specialMission = { text: "Crea una <b>base sicura</b> usando elementi della stanza.", icon: "🌠" };
        let gameState = { missionsCompleted: 0, sessionMissions: [] };

        function startNewSession() {
            const shuffled = [...missionPool].sort(() => 0.5 - Math.random());
            gameState.sessionMissions = shuffled.slice(0, 3);
            gameState.missionsCompleted = 0;
            updateMissionUI();
            nav('mission');
        }

        function updateMissionUI() {
            let data;
            if (gameState.missionsCompleted < 3) {
                data = gameState.sessionMissions[gameState.missionsCompleted];
                document.getElementById('progress').innerText = `Missione ${gameState.missionsCompleted + 1} / 3`;
            } else {
                data = specialMission;
                document.getElementById('progress').innerText = `Fase Finale`;
            }
            document.getElementById('mission-text').innerHTML = data.text;
            document.getElementById('mission-icon').innerText = data.icon;
        }

        function handleComplete() {
            gameState.missionsCompleted++;
            if (gameState.missionsCompleted === 3) {
                nav('alert-screen');
                setTimeout(() => { updateMissionUI(); nav('mission'); }, 1500);
            } else if (gameState.missionsCompleted > 3) {
                lastBadge = badges[Math.floor(Math.random() * badges.length)];
                document.getElementById('badge-name-end').innerText = lastBadge;
                nav('end-screen');
            } else {
                updateMissionUI();
            }
        }

        function resetAndHome() {
            const homeDisplay = document.getElementById('home-badge-display');
            if (lastBadge !== "") {
                homeDisplay.innerText = lastBadge;
                homeDisplay.classList.remove('no-badge');
            }
            gameState.missionsCompleted = 0;
            nav('home');
        }

        function nav(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
        }

        document.addEventListener('touchstart', (e) => { if (e.touches.length > 1) e.preventDefault(); }, { passive: false });
    </script>
</body>
</html>
