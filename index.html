<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>SparkPlay</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">

<style>
:root {
  --rossa: #ff5e6c; --blu: #00d2ff; --giallo: #ffe66d;
  --sfondo: #0a1128; --latte: #f7fff7;
}
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body {
  margin: 0; background-color: var(--sfondo); font-family: 'Quicksand', sans-serif;
  color: var(--latte); height: 100vh; overflow: hidden;
  background-image: radial-gradient(circle at 50% 50%, #16224f 0%, var(--sfondo) 100%);
}

.multiverso-container {
  width: 200px; height: 200px; margin: 0 auto 20px; position: relative;
  display: flex; align-items: center; justify-content: center;
}
.icona-mondo { position: absolute; font-size: 50px; animation: orbitaMondi 8s linear infinite; }
.mondo-1 { animation-delay: 0s; }
.mondo-2 { animation-delay: -2.66s; }
.mondo-3 { animation-delay: -5.33s; }
@keyframes orbitaMondi {
  from { transform: rotate(0deg) translateX(70px) rotate(0deg); }
  to { transform: rotate(360deg) translateX(70px) rotate(-360deg); }
}
.centro-spark {
  width: 60px; height: 60px; background: white; border-radius: 50%;
  box-shadow: 0 0 30px var(--giallo); z-index: 5;
  display: flex; align-items: center; justify-content: center; font-size: 30px;
}

.sp-root {
  max-width: 600px; margin: 0 auto; height: 100vh; display: flex; flex-direction: column;
  padding: env(safe-area-inset-top) 25px env(safe-area-inset-bottom); position: relative;
}
.sp-top { display: flex; justify-content: space-between; align-items: center; padding: 20px 0; }
.brand { font-family: 'Fredoka One', cursive; font-size: 36px; color: var(--giallo); text-shadow: 3px 3px var(--rossa); }
.content-area { flex: 1; display: flex; flex-direction: column; gap: 20px; justify-content: center; position: relative; }
.testo-storia { font-size: 20px; line-height: 1.4; text-align: center; }
.obiettivo-box {
  border: 3px dashed var(--blu); border-radius: 25px; padding: 15px; text-align: center;
  font-weight: 700; color: var(--blu); background: rgba(0,210,255,0.05);
}
.passo {
  padding: 18px; border-radius: 25px; background: rgba(255, 255, 255, 0.08);
  display: flex; align-items: center; gap: 12px; margin-bottom: 12px; font-weight: 700; transition: 0.3s;
}
.passo.attivo {
  background: var(--latte); color: var(--sfondo); transform: scale(1.03);
  box-shadow: 0 10px 20px rgba(0,0,0,0.3);
}

.btn { border: none; font-family: 'Fredoka One', cursive; cursor: pointer; transition: 0.2s; border-radius: 25px; }
.btn-avanti { background: var(--rossa); color: white; padding: 20px; width: 100%; font-size: 20px; box-shadow: 0 6px 0 #c43d4a; }
.btn-avanti:active { transform: translateY(4px); box-shadow: 0 2px 0 #c43d4a; }

#diario-modal {
  position: fixed; inset: 0; background: linear-gradient(180deg, #101a3b, var(--sfondo));
  z-index: 2000; display: none; flex-direction: column; padding: 40px 25px; overflow-y: auto;
}
.scheda-ricordo {
  background: rgba(255,255,255,0.08); padding: 20px; border-radius: 24px; margin-bottom: 15px;
  border-left: 8px solid var(--blu); display: flex; align-items: center; gap: 20px;
}
.emoji-diario { font-size: 30px; opacity: 0.8; }
.testo-diario b { display: block; font-size: 19px; color: var(--giallo); }
.testo-diario small { color: var(--latte); opacity: 0.6; font-size: 12px; }

#overlay-success {
  position: fixed; inset: 0; pointer-events: none; display: none; flex-direction: column;
  align-items: center; justify-content: center; z-index: 3000; background: rgba(10, 17, 40, 0.9);
}
.messaggio-vittoria {
  font-family: 'Fredoka One'; font-size: 48px; color: var(--giallo);
  text-shadow: 4px 4px var(--rossa); text-align: center;
}
.cascata { position: absolute; pointer-events: none; top: -20px; animation: caduta 2s linear forwards; font-size: 28px; }
@keyframes caduta { to { transform: translateY(110vh) rotate(360deg); opacity: 0; } }

/* --- PREMIUM PATCH (SparkPlay) --- */
@keyframes pulseSpark { 0%{transform:scale(1)} 50%{transform:scale(1.05)} 100%{transform:scale(1)} }
.btn-avanti.pulse { animation: pulseSpark 2s infinite; }

#splash-screen{
  position:fixed; inset:0; z-index:5000;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  background: radial-gradient(circle at 50% 35%, #1b2a66 0%, var(--sfondo) 70%);
  color: var(--latte);
}
#splash-screen .logo{ font-family:'Fredoka One', cursive; font-size:44px; color:var(--giallo); text-shadow:3px 3px var(--rossa); margin-top:8px; }
#splash-screen .sub{ opacity:0.7; margin-top:6px; font-weight:700; }
.progress-wrap{ width:100%; max-width:420px; margin:10px auto 0; }
.progress-outer{ background:rgba(255,255,255,0.12); border-radius:12px; height:10px; overflow:hidden; }
.progress-inner{ background:var(--giallo); height:100%; width:0%; transition:0.25s; }
/* --------------------------------- */
</style>
</head>

<body>
<div id="splash-screen" aria-hidden="true">
  <div style="font-size:54px; filter: drop-shadow(0 10px 20px rgba(0,0,0,0.35));">✨</div>
  <div class="logo">SparkPlay</div>
  <div class="sub">Preparando la missione…</div>
</div>

<div id="overlay-success"><div class="messaggio-vittoria">MISSIONE<br>COMPLETATA!</div></div>

<div id="diario-modal">
  <div class="sp-top">
    <div class="brand">I TUOI RICORDI</div>
    <button class="btn" style="background:var(--rossa); color:white; padding:10px 20px;" onclick="chiudiDiario()">CHIUDI</button>
  </div>
  <div id="lista-diario" style="margin-top:20px; padding-bottom:40px;"></div>
</div>

<div id="SPARKPLAY_APP" class="sp-root"></div>

<script>
(()=>{"use strict";

const DB = {
  "5-7": [
    {t:"SEGNALE PERDUTO", s:"La base ha perso il segnale! La galassia è al buio!", o:"RIACCENDI L'ANTENNA!", p:["Trova un calzino stellare.","Portalo sulla base (tappeto).","Dì 3 Bip! lentamente."]},
    {t:"SATELLITE MORBIDO", s:"Un satellite è caduto tra le stelle!", o:"RECUPERALO!", p:["Trova un peluche-satellite.","Fagli fare un giro intorno al tavolo.","Mettilo a riposare in un posto alto."]},
    {t:"POLVERE DI STELLE", s:"C'è troppa polvere spaziale sui motori!", o:"PULISCI TUTTO!", p:["Usa le mani come spazzole spaziali.","Pulisci 3 superfici diverse.","Soffia via la polvere."]},
    {t:"PORTALE MAGNETICO", s:"Il portale si è chiuso e non passa più nulla!", o:"RIAPRILO!", p:["Trova una coperta.","Falla diventare un tunnel.","Passaci dentro piano."]},
    {t:"LUCE DI EMERGENZA", s:"La cabina è al buio!", o:"ACCENDI UNA LUCE!", p:["Trova una torcia o una luce.","Illumina 3 oggetti.","Fai il suono della sirena 2 volte."]},
    {t:"NAVETTA SMARRITA", s:"Una navetta non trova più la pista!", o:"GUIDALA A CASA!", p:["Prendi una macchinina/navetta.","Fai una pista con 3 oggetti.","Portala alla base."]}
  ],
  "8-10": [
    {t:"TRACCIA ORBITALE", s:"Un pianeta ha perso la sua rotta!", o:"RIMETTILO IN ORBITA!", p:["Scegli 1 oggetto (pianeta).","Disegna un'orbita con 4 oggetti.","Fallo girare 3 volte senza toccare i bordi."]},
    {t:"CODICE SILENZIOSO", s:"I nemici ascoltano tutto!", o:"RIPARA IN SILENZIO", p:["Trova un foglio di carta.","Portalo alla base senza fare rumore.","Piegalo in 4 e mettilo sotto un cuscino."]},
    {t:"CODICE STELLARE", s:"Dobbiamo inviare un codice segreto alla Terra!", o:"COMPONI IL CODICE", p:["Trova 3 oggetti dello stesso colore.","Mettili in fila dal più piccolo al più grande.","Salta sopra ogni oggetto."]},
    {t:"ANTIGRAVITÀ", s:"La gravità si è rotta! Tutto fluttua!", o:"MUOVITI LENTO", p:["Attraversa la stanza al rallentatore.","Tocca terra solo con le punte dei piedi.","Siediti senza usare le mani."]},
    {t:"SCUDO ATTIVO", s:"Lo scudo è debole!", o:"RINFORZA LO SCUDO!", p:["Prendi 3 cuscini.","Crea un muro intorno a te.","Rimani dentro 10 secondi senza uscire."]},
    {t:"RADAR DI CASA", s:"Il radar deve mappare la stanza!", o:"SCANSIONA!", p:["Scegli 5 oggetti.","Mettili in cerchio.","Fai un giro intorno senza toccarli."]}
  ],
  speciale: {t:"MISSIONE SINCRONIA 🤝", s:"I motori hanno bisogno di due piloti insieme!", o:"SQUADRA SPAZIALE", p:["Prendetevi per mano (Genitore + Bambino).","Fate 10 passi sincronizzati insieme.","Dite 'Pronti al lancio' nello stesso istante!"], f:"Siete una squadra imbattibile!"}
};

const FRASI = [
  "L'immaginazione è l'unica astronave che arriva ovunque.",
  "Il gioco è il lavoro più serio del mondo.",
  "Piccoli passi. Grandi avventure.",
  "Oggi una missione. Domani un mondo."
];

let s = {
  fsm:"INIZIO",
  eta:null,
  passo:0,
  missioneAttuale:null,
  audio:false,
  diario: [],
  specialeFatta:false,

  // Daily / Montessori limits
  oggiKey:null,
  oggiFatte:0,
  oggiLimite:3,
  extraSbloccate:0,
  specialeFattaOggi:false,
  sequenzaOggi:[],

  // Gate
  gateTipo:null,
  gateErrore:""
};

/* --- Helpers: daily state + effects --- */
function oggiKey(){
  const d = new Date();
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,"0");
  const da = String(d.getDate()).padStart(2,"0");
  return `${y}-${m}-${da}`;
}
function caricaStatoGiorno(){
  const key = oggiKey();
  s.oggiKey = key;

  const saved = JSON.parse(localStorage.getItem("sparkplay_day") || "{}");
  if(saved.key === key){
    s.oggiFatte = Number(saved.oggiFatte || 0);
    s.extraSbloccate = Number(saved.extraSbloccate || 0);
    s.specialeFattaOggi = !!saved.specialeFattaOggi;
    s.sequenzaOggi = Array.isArray(saved.sequenzaOggi) ? saved.sequenzaOggi : [];
  } else {
    s.oggiFatte = 0;
    s.extraSbloccate = 0;
    s.specialeFattaOggi = false;
    s.sequenzaOggi = [];
    salvaStatoGiorno();
  }
}
function salvaStatoGiorno(){
  localStorage.setItem("sparkplay_day", JSON.stringify({
    key: s.oggiKey,
    oggiFatte: s.oggiFatte,
    extraSbloccate: s.extraSbloccate,
    specialeFattaOggi: s.specialeFattaOggi,
    sequenzaOggi: s.sequenzaOggi
  }));
}
function limiteOggi(){
  return s.oggiLimite + s.extraSbloccate;
}
function creaStelle(n=18){
  for(let i=0;i<n;i++){
    const el = document.createElement("div");
    el.className = "cascata";
    el.textContent = "✨";
    el.style.left = (Math.random()*100) + "vw";
    el.style.animationDuration = (1.2 + Math.random()*1.4) + "s";
    document.body.appendChild(el);
    setTimeout(()=>el.remove(), 2200);
  }
}
function vibra(){
  try{ if(navigator.vibrate) navigator.vibrate([180,80,180]); }catch(e){}
}
/* ------------------------------------- */

function parla(testo, alTermine){
  if(!s.audio) { if(alTermine) alTermine(); return; }
  try { speechSynthesis.cancel(); } catch(e){}
  const m = new SpeechSynthesisUtterance(testo);
  m.lang="it-IT"; m.rate=0.9;
  if(alTermine) m.onend = alTermine;
  try { speechSynthesis.speak(m); } catch(e){}
}

function disegna(){
  const root = document.getElementById("SPARKPLAY_APP");

  if(s.fsm === "INIZIO"){
    const frase = FRASI[Math.floor(Math.random()*FRASI.length)];
    root.innerHTML = `<div class="sp-top">
        <button class="btn" style="background:none;font-size:32px;" onclick="apriDiario()">📚</button>
        <div class="brand">SPARKPLAY</div>
        <button class="btn" style="background:none;font-size:32px;" onclick="toggleAudio()">${s.audio?'🔊':'🔈'}</button>
      </div>
      <div class="content-area">
        <div class="multiverso-container">
          <div class="centro-spark">✨</div>
          <div class="icona-mondo mondo-1">🚀</div>
          <div class="icona-mondo mondo-2">🪄</div>
          <div class="icona-mondo mondo-3">🔍</div>
        </div>

        <h1 style="text-align:center;color:var(--giallo);font-size:52px;margin:0;">PRONTI?</h1>
        <div style="text-align:center;opacity:0.75;font-weight:700;">${frase}</div>

        <div class="progress-wrap">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-top:14px;opacity:0.85;font-weight:700;">
            <span>OGGI: <span id="count-oggi">${s.oggiFatte}</span>/${limiteOggi()}</span>
            <span style="font-size:12px;opacity:0.75;">Limite genitore</span>
          </div>
          <div class="progress-outer" aria-label="Progresso missioni di oggi">
            <div id="barraMissioni" class="progress-inner" style="width:${Math.min(100,(s.oggiFatte/Math.max(1,limiteOggi()))*100)}%"></div>
          </div>
        </div>

        <button class="btn btn-avanti pulse" style="width:85%; margin:18px auto 0;" onclick="vaiEta()">INIZIA AVVENTURA 🚀</button>

        <div style="text-align:center;opacity:0.55;font-size:12px; margin-top:6px;">
          ${s.oggiFatte >= limiteOggi() ? 'Hai finito le missioni di oggi. Chiedi al genitore per sbloccare.' : '3 minuti, oggetti di casa, zero stress.'}
        </div>
      </div>`;
  }
  else if(s.fsm === "ETA"){
    root.innerHTML = `<div class="sp-top"><div class="brand">CHI SEI?</div></div><div class="content-area">
        <button class="btn" style="background:rgba(0,210,255,0.15); border:3px solid var(--blu); color:white; padding:25px; font-size:24px; margin-bottom:15px; border-radius:30px; display:flex; align-items:center; justify-content:space-between;" onclick="scegliEta('5-7')"><span style="font-size:40px;">🚀</span><div style="text-align:right;"><b>ESPLORATORE</b><br><small>5-7 ANNI</small></div></button>
        <button class="btn" style="background:rgba(255,94,108,0.15); border:3px solid var(--rossa); color:white; padding:25px; font-size:24px; border-radius:30px; display:flex; align-items:center; justify-content:space-between;" onclick="scegliEta('8-10')"><span style="font-size:40px;">🧠</span><div style="text-align:right;"><b>COMANDANTE</b><br><small>8-10 ANNI</small></div></button></div>`;
  }
  else if(s.fsm === "GIOCO"){
    const m = s.missioneAttuale;
    root.innerHTML = `<div class="sp-top">
        <button class="btn" style="background:none;font-size:32px;" onclick="toggleAudio()">${s.audio?'🔊':'🔈'}</button>
        <div class="brand" style="font-size:20px">${m.t}</div>
        <button class="btn" style="background:rgba(255,255,255,0.1);color:white;padding:8px 15px;border-radius:15px;" onclick="home()">ESCI</button>
      </div>
      <div class="content-area">
        <div class="testo-storia">${m.s}</div>
        <div class="obiettivo-box">OBIETTIVO: ${m.o}</div>
        <div class="passaggi">
          ${m.p.map((t,i)=>`<div class="passo ${i===s.passo?'attivo':''}">
            <div style="background:var(--rossa);color:white;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin-right:10px;font-size:16px;">${i+1}</div>
            ${t}
          </div>`).join('')}
        </div>
        <div style="display:flex;gap:15px;margin-top:10px;">
          <button class="btn" style="background:rgba(255,255,255,0.1);color:white;flex:1;padding:15px;" onclick="precedente()" ${s.passo===0?'style="visibility:hidden"':''}>INDIETRO</button>
          <button class="btn btn-avanti" style="flex:2;" onclick="successivo()">${s.passo < m.p.length-1 ? 'AVANTI' : 'COMPLETA ✅'}</button>
        </div>
      </div>`;
  }
  else if(s.fsm === "SCELTA_GENITORE"){
    const finito = (s.oggiFatte >= limiteOggi());
    const sbloccabile = (s.oggiFatte >= 3) && !s.specialeFattaOggi;
    const btnSpeciale = sbloccabile
      ? `<button class="btn" style="background:var(--blu);color:white;padding:22px;width:100%;margin-bottom:18px;font-size:20px;" onclick="apriGate('SPECIALE')">MISSIONE SPECIALE 🤝</button>`
      : `<div style="opacity:0.65;text-align:center;margin-bottom:14px;">
           ${s.specialeFattaOggi ? '🌟 Missione speciale: già fatta oggi.' : '🌟 Missione speciale: si sblocca dopo 3 missioni.'}
         </div>`;
    root.innerHTML = `<div class="sp-top"><div class="brand">GENITORE</div></div>
      <div class="content-area">
        <h2 style="text-align:center;font-size:32px;color:var(--giallo); margin:0;">CAPITOLO FINITO! 🏆</h2>
        <div style="text-align:center;opacity:0.8;font-weight:700;">
          Oggi: <b>${s.oggiFatte}</b>/${limiteOggi()} missioni
        </div>

        ${btnSpeciale}

        <button class="btn" style="background:rgba(255,255,255,0.12);color:white;padding:22px;width:100%;margin-bottom:18px;font-size:20px;" onclick="apriGate('ALTRE')">SBLOCCA ALTRE 3 🚀</button>

        <button class="btn" style="background:var(--rossa);color:white;padding:15px;width:100%;font-size:18px;" onclick="home()">FINISCI PER OGGI</button>

        <div style="text-align:center;opacity:0.6;font-size:12px;margin-top:10px;">
          (Serve un genitore per sbloccare. Così SparkPlay resta sano e “Montessori”.)
        </div>
      </div>`;
  }
  else if(s.fsm === "GATE"){
    const titolo = (s.gateTipo === "SPECIALE") ? "SBLOCCA MISSIONE SPECIALE" : "SBLOCCA ALTRE 3";
    root.innerHTML = `<div class="sp-top"><div class="brand">GENITORE</div></div>
      <div class="content-area">
        <h2 style="text-align:center;font-size:28px;color:var(--giallo);margin:0;">${titolo}</h2>
        <p style="text-align:center;opacity:0.8;margin:0;">Solo un genitore può continuare.</p>

        <div style="margin-top:18px;background:rgba(255,255,255,0.08);border-radius:24px;padding:18px;">
          <div style="font-weight:800; text-align:center; margin-bottom:10px;">Quanto fa <span style="color:var(--giallo);">5 + 5</span>?</div>
          <input id="gate-input" inputmode="numeric" pattern="[0-9]*" placeholder="Risposta" style="width:100%;padding:16px;border-radius:18px;border:2px solid rgba(255,255,255,0.18);background:rgba(0,0,0,0.2);color:white;font-size:18px;text-align:center;outline:none;" />
          ${s.gateErrore ? `<div style="margin-top:10px;text-align:center;color:var(--rossa);font-weight:800;">${s.gateErrore}</div>` : ``}
        </div>

        <button class="btn btn-avanti" style="margin-top:18px;" onclick="verificaGate()">CONFERMA ✅</button>
        <button class="btn" style="background:rgba(255,255,255,0.12);color:white;padding:16px;width:100%;margin-top:12px;font-size:16px;" onclick="annullaGate()">ANNULLA</button>

        <div style="text-align:center;opacity:0.55;font-size:12px;margin-top:10px;">
          (È un gate semplice per evitare che i bambini sblocchino da soli.)
        </div>
      </div>`;
  }
}

window.apriDiario = () => {
  const l = document.getElementById("lista-diario");
  l.innerHTML = s.diario.length
    ? s.diario.map(m => `<div class="scheda-ricordo"><div class="emoji-diario">📖</div><div class="testo-diario"><small>${m.data}</small><b>${m.titolo}</b></div></div>`).join('')
    : "<p style='text-align:center;opacity:0.6;'>Il diario è vuoto.</p>";
  document.getElementById("diario-modal").style.display = "flex";
}
window.chiudiDiario = () => { document.getElementById("diario-modal").style.display = "none"; }

window.toggleAudio = () => {
  s.audio = !s.audio;
  localStorage.setItem("sparkplay_audio", s.audio ? "1":"0");
  if(s.audio) parla("Audio attivato");
  else { try{ speechSynthesis.cancel(); } catch(e){} }
  disegna();
};

window.vaiEta = () => {
  if(s.oggiFatte >= limiteOggi()){
    s.fsm = "SCELTA_GENITORE";
    disegna();
    return;
  }
  s.fsm = "ETA";
  disegna();
};

window.scegliEta = (e) => {
  s.eta = e;
  s.passo = 0;
  if(s.oggiFatte >= limiteOggi()){
    s.fsm = "SCELTA_GENITORE";
    disegna();
  } else {
    s.fsm = "GIOCO";
    proproxima();
  }
};

window.home = () => { s.fsm = "INIZIO"; s.passo=0; s.missioneAttuale=null; disegna(); };

window.apriGate = (tipo) => { s.gateTipo = tipo; s.gateErrore = ""; s.fsm = "GATE"; disegna(); };

window.verificaGate = () => {
  const v = (document.getElementById("gate-input")?.value || "").trim();
  if(v !== "10"){
    s.gateErrore = "Risposta errata. Riprova 🙂";
    disegna();
    return;
  }
  if(s.gateTipo === "SPECIALE"){
    if(s.specialeFattaOggi){ s.gateErrore = "Missione speciale già fatta oggi."; disegna(); return; }
    s.missioneAttuale = DB.speciale;
    s.specialeFattaOggi = true;
    salvaStatoGiorno();
    s.fsm = "GIOCO";
    s.passo = 0;
    disegna();
    parla(s.missioneAttuale.s + ". Obiettivo: " + s.missioneAttuale.o + ". Passaggio 1: " + s.missioneAttuale.p[0]);
  } else {
    s.extraSbloccate += 3;
    salvaStatoGiorno();
    s.fsm = "GIOCO";
    proproxima();
  }
};

window.annullaGate = () => { s.fsm = "SCELTA_GENITORE"; disegna(); };

function proproxima(){
  if(!s.eta){ s.fsm="ETA"; disegna(); return; }

  if(s.oggiFatte >= limiteOggi()){
    s.fsm = "SCELTA_GENITORE";
    disegna();
    return;
  }

  const lista = DB[s.eta] || [];
  const idx = (s.oggiFatte % Math.max(1, lista.length));
  s.missioneAttuale = lista[idx];
  s.passo = 0;
  s.fsm = "GIOCO";
  disegna();
  parla(s.missioneAttuale.s + ". Obiettivo: " + s.missioneAttuale.o + ". Passaggio 1: " + s.missioneAttuale.p[0]);
}

window.successivo = () => {
  if(s.passo < s.missioneAttuale.p.length - 1){
    s.passo++;
    disegna();
    parla("Passaggio " + (s.passo+1) + ": " + s.missioneAttuale.p[s.passo]);
    return;
  }

  // completata
  document.getElementById("overlay-success").style.display = "flex";
  creaStelle(22);
  vibra();

  // salva diario
  s.diario.unshift({ titolo: s.missioneAttuale.t, data: new Date().toLocaleDateString('it-IT') });
  localStorage.setItem('sparkplay_diario', JSON.stringify(s.diario));

  setTimeout(() => {
    document.getElementById("overlay-success").style.display = "none";

    // Se era la speciale, torni al genitore
    if (s.missioneAttuale === DB.speciale) {
      s.fsm = "SCELTA_GENITORE";
      disegna();
      return;
    }

    // conta missione di oggi
    s.oggiFatte++;
    salvaStatoGiorno();

    // se raggiunto limite, vai al genitore
    if (s.oggiFatte >= limiteOggi()) {
      s.fsm = "SCELTA_GENITORE";
      disegna();
      return;
    }

    proproxima();
  }, 1800);
};

window.precedente = () => {
  if(s.passo > 0){
    s.passo--;
    disegna();
    parla("Passaggio " + (s.passo+1) + ": " + s.missioneAttuale.p[s.passo]);
  }
};

const salvato = localStorage.getItem('sparkplay_diario');
if(salvato) s.diario = JSON.parse(salvato);

caricaStatoGiorno();
const a = localStorage.getItem("sparkplay_audio");
if(a==="1") s.audio = true;

// Splash: nascondi dopo un attimo (effetto app)
window.addEventListener("load", () => {
  const splash = document.getElementById("splash-screen");
  if(splash){
    setTimeout(()=>{ splash.style.display="none"; }, 900);
  }
});
// evita stuck audio su iOS: carica voci quando disponibili
try{ window.speechSynthesis?.getVoices?.(); }catch(e){}

disegna();
})();
</script>
