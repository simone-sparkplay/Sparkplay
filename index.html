<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SparkPlay</title>
    <style>
        :root {
            --bg-color: #0b0e14;
            --card-color: #1e2530;
            --accent-color: #a27cff;
            --text-color: #ffffff;
            --button-grad: linear-gradient(180deg, #9d50bb 0%, #6e48aa 100%);
            --secondary-grad: linear-gradient(180deg, #444 0%, #222 100%);
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden; /* Blocca lo scroll della pagina intera */
        }

        /* Gestione Overscroll sicura per iOS */
        body {
            overscroll-behavior: none; 
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Schermi */
        .screen {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: space-around; /* Più spazio tra gli elementi */
            width: 100%;
            height: 100%;
            padding: 40px 20px;
            text-align: center;
            animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .screen.active {
            display: flex;
        }

        @keyframes popIn {
            from { opacity: 0; transform: scale(0.8); }
            to { opacity: 1; transform: scale(1); }
        }

        /* Testi */
        h1 { font-size: 4rem; margin: 0; text-shadow: 0 4px 10px rgba(157, 80, 187, 0.5); }
        h2 { font-size: 2.5rem; margin: 10px 0; }
        p { font-size: 1.5rem; line-height: 1.4; margin: 20px 0; }

        /* Bottoni Giganti */
        .btn {
            background: var(--button-grad);
            color: white;
            border: none;
            border-radius: 30px;
            padding: 30px 20px; /* Padding aumentato */
            font-size: 2rem;
            font-weight: 900;
            cursor: pointer;
            box-shadow: 0 8px 0 #4a2d7a, 0 15px 25px rgba(0,0,0,0.5);
            transition: all 0.1s;
            width: 90%;
            max-width: 400px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .btn:active {
            transform: translateY(4px);
            box-shadow: 0 4px 0 #4a2d7a, 0 10px 15px rgba(0,0,0,0.5);
        }

        .btn-back {
            background: var(--secondary-grad);
            font-size: 1.2rem;
            padding: 15px;
            box-shadow: 0 5px 0 #111;
            margin-top: 20px;
        }

        /* Card Selezione Mondo */
        .world-card {
            background: var(--card-color);
            border-radius: 40px;
            padding: 50px 20px;
            border: 4px solid var(--accent-color);
            width: 85%;
            max-width: 350px;
            box-shadow: 0 0 30px rgba(162, 124, 255, 0.3);
        }

        .icon-huge {
            font-size: 6rem;
            display: block;
            margin-bottom: 20px;
            filter: drop-shadow(0 0 10px white);
        }
    </style>
</head>
<body>

    <section id="home" class="screen active">
        <h1>✨ SparkPlay</h1>
        <button class="btn" onclick="nav('world-select')">GIOCA</button>
    </section>

    <section id="world-select" class="screen">
        <h2>Scegli il Mondo</h2>
        <div class="world-card" onclick="nav('mission')">
            <span class="icon-huge">🚀</span>
            <h2>SPAZIO</h2>
        </div>
        <button class="btn btn-back" onclick="nav('home')">Indietro</button>
    </section>

    <section id="mission" class="screen">
        <div>
            <span class="icon-huge">👨‍🚀</span>
            <h2>Missione</h2>
        </div>
        <p>Trova qualcosa di <b>spaziale</b> nella stanza! 🚀</p>
        <button class="btn" onclick="nav('end-screen')">FATTO!</button>
    </section>

    <section id="end-screen" class="screen">
        <div>
            <span class="icon-huge">🏆</span>
            <h2>Bravissimo!</h2>
            <p>Missione Compiuta!</p>
        </div>
        <div style="width: 100%; display: flex; flex-direction: column; align-items: center; gap: 20px;">
            <button class="btn" onclick="nav('home')">TORNA ALL'INIZIO</button>
            <button class="btn btn-back" onclick="nav('world-select')">Gioca ancora</button>
        </div>
    </section>

    <script>
        /**
         * Navigazione tra schermi
         */
        function nav(screenId) {
            // Rimuove la classe active da tutti
            const screens = document.querySelectorAll('.screen');
            screens.forEach(s => s.classList.remove('active'));

            // Attiva il nuovo schermo
            const target = document.getElementById(screenId);
            if (target) {
                target.classList.add('active');
                // Feedback tattile (vibrazione) se supportato
                if (navigator.vibrate) navigator.vibrate(10);
            }
        }

        // Blocca solo il rimbalzo elastico tipico di iOS Safari 
        // senza rompere l'interattività dei bottoni
        document.addEventListener('touchmove', function (e) {
            if (e.scale !== 1) { e.preventDefault(); }
        }, { passive: false });
    </script>
</body>
</html>
