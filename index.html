<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SparkPlay</title>
    <style>
        :root {
            --bg-space: #070a1a;
            --panel-glass: rgba(20, 26, 50, 0.8);
            --accent-magic: #a27cff;
            --accent-gold: #ffeb3b;
            --text-main: #ffffff;
            --text-soft: #94a3b8;
            --btn-grad: linear-gradient(180deg, #9d50bb 0%, #6e48aa 100%);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        html, body {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: var(--bg-space);
            background-image: radial-gradient(circle at 50% 100%, #1a1b4a 0%, #070a1a 100%);
            color: var(--text-main);
            font-family: 'Quicksand', 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
        }

        body { display: flex; justify-content: center; align-items: center; }

        .screen {
            display: none; flex-direction: column; align-items: center; justify-content: center;
            width: 100%; height: 100%; padding: 40px; text-align: center;
            position: absolute; opacity: 0; transition: all 0.5s ease;
            pointer-events: none;
        }

        .screen.active { display: flex; opacity: 1; pointer-events: auto; z-index: 10; }

        /* --- DIARIO UI (NUOVO) --- */
        .diary-btn {
            position: absolute; top: 30px; right: 25px;
            width: 44px; height: 44px; border-radius: 12px;
            background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255,255,255,0.2);
            display: flex; align-items: center; justify-content: center;
            font-size: 1.4rem; cursor: pointer; z-index: 100;
        }

        .diary-modal {
            background: #0a0e1c; border: 1px solid var(--accent-magic);
            border-radius: 25px; padding: 25px; width: 85%; max-width: 320px;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }

        .diary-line { display: flex; justify-content: space-between; margin: 12px 0; font-size: 0.9rem; color: var(--text-soft); border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 5px; }
        .diary-val { color: #fff; font-weight: bold; }

        /* --- UI ESISTENTE --- */
        h1 { font-size: 3.2rem; margin: 0; filter: drop-shadow(0 0 10px var(--accent-magic)); }
        .btn-main {
            background: var(--btn-grad); color: white; border: none; border-radius: 40px; 
            padding: 20px 50px; font-size: 1.6rem; font-weight: 800; cursor: pointer;
            box-shadow: 0 8px 0 #4a2d7a; margin-top: 40px; text-transform: uppercase;
        }
        .btn-main:active { transform: translateY(4px); box-shadow: 0 2px 0 #4a2d7a; }
        .btn-sec { background: transparent; border: 1px solid rgba(255,255,255,0.2); color: #fff; padding: 12px 25px; border-radius: 15px; margin-top: 20px; cursor: pointer; }

        .world-portal { background: var(--panel-glass); border-radius: 30px; padding: 40px; border: 1px solid rgba(162, 124, 255, 0.3); width: 260px; cursor: pointer; }
        .icon-huge { font-size: 4.5rem; display: block; margin-bottom: 15px; }
    </style>
</head>
<body>

    <div id="diary-trigger" class="diary-btn" onclick="nav('diary-screen')">📖</div>

    <section id="home" class="screen active">
        <h1>SparkPlay</h1>
        <button class="btn-main" onclick="nav('world-select')">Gioca</button>
    </section>

    <section id="diary-screen" class="screen">
        <div class="diary-modal">
            <h3 style="margin-top:0; color:var(--accent-magic); letter-spacing:2px">DIARIO DI BORDO</h3>
            <div class="diary-line">Mondo: <span id="d-world" class="diary-val">--</span></div>
            <div class="diary-line">Titolo: <span id="d-badge" class="diary-val">--</span></div>
            <div class="diary-line" style="border:none">Super Missione: <span id="d-super" class="diary-val">--</span></div>
            <button class="btn-sec" onclick="nav('home')" style="width:100%">Chiudi</button>
        </div>
    </section>

    <section id="world-select" class="screen">
        <div class="world-portal" onclick="startSession('Spazio')">
            <span class="icon-huge">🚀</span>
            <div style="letter-spacing:3px; font-weight:bold">SPAZIO</div>
        </div>
        <button class="btn-sec" onclick="nav('home')">Indietro</button>
    </section>

    <section id="mission" class="screen">
        <div id="m-progress" style="color:var(--accent-magic); margin-bottom:15px">MISSIONE 1 DI 3</div>
        <span id="m-icon" class="icon-huge">🚀</span>
        <p id="m-text" style="font-size:1.4rem; padding:0 20px">...</p>
        <button class="btn-main" onclick="handleComplete()">Fatto!</button>
    </section>

    <section id="alert-s" class="screen">
        <span class="icon-huge">🌠</span>
        <h1>SUPER MISSIONE!</h1>
    </section>

    <section id="end-screen" class="screen">
        <span class="icon-huge">🏆</span>
        <h2 id="final-badge" style="color:var(--accent-gold); font-size:1.8rem">--</h2>
        <p>Missione Completata!</p>
        <button class="btn-main" onclick="saveAndHome()">Torna alla Base</button>
    </section>

    <script>
        // --- MEMORIA RUNTIME ---
        let diaryData = { world: "--", badge: "--", super: "--" };
        let currentSessionBadge = "";

        const missions = [
            { t: "Trova un oggetto <b>rosso</b>! 🔴", i: "☄️" },
            { t: "Fai 5 salti spaziali! ⬆️", i: "👨‍🚀" },
            { t: "Cerca qualcosa di <b>tondo</b>! 🌕", i: "🛰️" }
        ];
        const badges = ["Esploratore Spaziale", "Comandante", "Eroe Galattico"];
        const superM = { name: "Base di Cuscini", t: "Costruisci una <b>base spaziale</b> con i cuscini!", i: "🌠" };
        
        let state = { count: 0, pool: [], world: "" };

        function startSession(w) {
            state.world = w;
            state.pool = [...missions].sort(() => 0.5 - Math.random());
            state.count = 0;
            updateUI();
            nav('mission');
        }

        function updateUI() {
            let d = (state.count < 3) ? state.pool[state.count] : superM;
            document.getElementById('m-progress').innerText = (state.count < 3) ? `MISSIONE ${state.count+1} DI 3` : "SFIDA FINALE";
            document.getElementById('m-text').innerHTML = d.t;
            document.getElementById('m-icon').innerText = d.i;
        }

        function handleComplete() {
            state.count++;
            if (state.count === 3) {
                nav('alert-s');
                setTimeout(() => { updateUI(); nav('mission'); }, 2000);
            } else if (state.count > 3) {
                currentSessionBadge = badges[Math.floor(Math.random() * badges.length)];
                document.getElementById('final-badge').innerText = currentSessionBadge;
                nav('end-screen');
            } else {
                updateUI();
            }
        }

        function saveAndHome() {
            // Aggiorna i dati solo alla fine
            diaryData.world = state.world;
            diaryData.badge = currentSessionBadge;
            diaryData.super = superM.name;
            
            // Inietta i valori nel Diario
            document.getElementById('d-world').innerText = diaryData.world;
            document.getElementById('d-badge').innerText = diaryData.badge;
            document.getElementById('d-super').innerText = diaryData.super;
            
            nav('home');
        }

        function nav(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            // Mostra il trigger del diario solo in Home
            document.getElementById('diary-trigger').style.display = (id === 'home') ? 'flex' : 'none';
        }
    </script>
</body>
</html>
