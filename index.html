<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SparkPlay</title>
    <style>
        :root {
            --bg-color: #0b0e14;
            --card-color: #1e2530;
            --accent-color: #a27cff;
            --text-color: #ffffff;
            --button-grad: linear-gradient(180deg, #9d50bb 0%, #6e48aa 100%);
            --secondary-grad: linear-gradient(180deg, #444 0%, #222 100%);
            --gold: #ffeb3b;
            --transition-speed: 0.4s;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        html, body {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: var(--bg-color); color: var(--text-color);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden; overscroll-behavior: none;
        }

        body { display: flex; justify-content: center; align-items: center; }

        .screen {
            display: none; flex-direction: column; align-items: center; justify-content: space-around;
            width: 100%; height: 100%; padding: 40px 20px; text-align: center;
            position: absolute; top: 0; left: 0; opacity: 0;
            transform: scale(1.1); transition: all var(--transition-speed) cubic-bezier(0.4, 0, 0.2, 1);
            pointer-events: none; z-index: 1;
        }

        .screen.active { display: flex; opacity: 1; transform: scale(1); pointer-events: auto; z-index: 10; }

        /* --- Memory UI --- */
        .history-tag {
            font-size: 0.9rem; color: var(--accent-color);
            background: rgba(162, 124, 255, 0.1);
            padding: 5px 15px; border-radius: 15px;
            margin-top: 10px; display: none; /* Nascosto finché non c'è un badge */
        }

        .welcome-msg { font-size: 1.2rem; color: var(--gold); margin-bottom: -20px; opacity: 0.9; }

        /* --- Badge & Rewards --- */
        .badge-box {
            background: rgba(255, 235, 59, 0.1);
            border: 2px dashed var(--gold); border-radius: 20px;
            padding: 15px 25px; margin: 20px 0;
            animation: celebrate 0.8s ease-out both;
        }

        @keyframes celebrate {
            0% { transform: scale(0); rotate: -10deg; }
            70% { transform: scale(1.1); rotate: 5deg; }
            100% { transform: scale(1); rotate: 0deg; }
        }

        .badge-text { color: var(--gold); font-size: 1.8rem; font-weight: 900; text-transform: uppercase; }

        /* --- Typography & Buttons --- */
        h1 { font-size: 3.5rem; margin: 0; text-shadow: 0 0 20px rgba(157, 80, 187, 0.4); }
        h2 { font-size: 2.2rem; margin: 10px 0; }
        p { font-size: 1.5rem; line-height: 1.4; margin: 15px 0; max-width: 85%; }

        .btn {
            position: relative; background: var(--button-grad); color: white;
            border: none; border-radius: 30px; padding: 25px 20px;
            font-size: 1.8rem; font-weight: 900; cursor: pointer;
            box-shadow: 0 8px 0 #4a2d7a, 0 15px 25px rgba(0,0,0,0.4);
            transition: all 0.1s ease; width: 90%; max-width: 400px;
            text-transform: uppercase; letter-spacing: 2px;
        }

        .btn:active { transform: scale(0.92) translateY(4px); box-shadow: 0 2px 0 #4a2d7a; }
        .btn-back { background: var(--secondary-grad); font-size: 1.2rem; padding: 15px; box-shadow: 0 5px 0 #111; margin-top: 20px; }

        .icon-huge { font-size: 6rem; display: block; filter: drop-shadow(0 0 10px var(--accent-color)); }
        .pulse { animation: pulse 1s infinite alternate; color: var(--gold); }
        @keyframes pulse { from { transform: scale(1); opacity: 1; } to { transform: scale(1.1); opacity: 0.7; } }
    </style>
</head>
<body>

    <section id="home" class="screen active">
        <div id="welcome-container" class="welcome-msg" style="display: none;">Bentornato Astronauta! 👨‍🚀</div>
        <h1>✨ SparkPlay</h1>
        <button class="btn" onclick="nav('world-select')">INIZIA</button>
        <div id="last-badge-info" class="history-tag">Ultimo titolo: <span id="history-badge-name"></span></div>
    </section>

    <section id="world-select" class="screen">
        <h2>Scegli il Mondo</h2>
        <div style="background: var(--card-color); border-radius: 40px; padding: 40px 20px; border: 4px solid var(--accent-color);" onclick="startNewSession()">
            <span class="icon-huge">🚀</span>
            <h2>SPAZIO</h2>
        </div>
        <button class="btn btn-back" onclick="nav('home')">Indietro</button>
    </section>

    <section id="mission" class="screen">
        <div id="mission-ui">
            <div id="progress" style="background: rgba(162, 124, 255, 0.2); padding: 8px 20px; border-radius: 20px; font-weight: bold; font-size: 1rem; color: var(--accent-color); margin-bottom: 10px; border: 1px solid var(--accent-color);">Missione 1 di 3</div>
            <span id="mission-icon" class="icon-huge">🚀</span>
            <h2 id="mission-title">Missione</h2>
            <p id="mission-text">Caricamento...</p>
        </div>
        <button class="btn" onclick="handleComplete()">FATTO!</button>
    </section>

    <section id="alert-screen" class="screen">
        <h2 class="pulse">ATTENZIONE...</h2>
        <span class="icon-huge">🌠</span>
        <h2 style="color: var(--gold);">SUPER MISSIONE<br>IN ARRIVO!</h2>
    </section>

    <section id="end-screen" class="screen">
        <div>
            <span class="icon-huge">🏆</span>
            <h2 id="final-title">ECCEZIONALE!</h2>
            <p>Hai sbloccato un nuovo titolo:</p>
            <div class="badge-box">
                <span id="badge-display" class="badge-text">EROE GALATTICO</span>
            </div>
            <p id="teaser-text" style="font-size: 1.1rem; opacity: 0.9; color: var(--accent-color);">
                Nuove sfide sbloccate per domani! 🚀
            </p>
        </div>
        <button class="btn" onclick="resetAndHome()">TORNA ALLA BASE</button>
    </section>

    <script>
        // --- MEMORIA DI SESSIONE (Runtime Only) ---
        let sessionMemory = {
            lastBadge: null,
            hasPlayed: false
        };

        const missionPool = [
            { text: "Trova un oggetto <b>rosso</b> come Marte! 🔴", icon: "☄️" },
            { text: "Fai 5 salti spaziali verso l'alto! ⬆️", icon: "👨‍🚀" },
            { text: "Trova qualcosa di <b>tondo</b> come la Luna! 🌕", icon: "🛰️" },
            { text: "Nasconditi dagli alieni per 10 secondi! 🛸", icon: "👽" },
            { text: "Disegna una stella magica nell'aria! ✨", icon: "⭐" },
            { text: "Cammina al rallentatore come sulla Luna! 👣", icon: "👨‍🚀" }
        ];

        const badges = ["Esploratore Spaziale", "Comandante delle Stelle", "Eroe Galattico", "Pilota Leggendario"];
        const teasers = [
            "Domani missioni più difficili ti aspettano! 🚀",
            "Nuove sfide sbloccate per domani! ✨",
            "Il comando spaziale ti aspetta domani! 🛰️"
        ];

        const specialMission = { text: "Missione Speciale: Costruisci una <b>base spaziale</b> con i cuscini! 🏠", icon: "🌠" };
        let gameState = { missionsCompleted: 0, sessionMissions: [] };

        function startNewSession() {
            const shuffled = [...missionPool].sort(() => 0.5 - Math.random());
            gameState.sessionMissions = shuffled.slice(0, 3);
            gameState.missionsCompleted = 0;
            updateMissionUI();
            nav('mission');
        }

        function updateMissionUI() {
            const ui = document.getElementById('mission-ui');
            ui.style.opacity = "0";
            setTimeout(() => {
                let data;
                if (gameState.missionsCompleted < 3) {
                    data = gameState.sessionMissions[gameState.missionsCompleted];
                    document.getElementById('progress').innerText = `Missione ${gameState.missionsCompleted + 1} di 3`;
                    document.getElementById('mission-title').innerText = "Missione";
                } else {
                    data = specialMission;
                    document.getElementById('progress').innerText = `ULTIMA SFIDA!`;
                    document.getElementById('mission-title').innerText = "SUPER MISSIONE";
                }
                document.getElementById('mission-text').innerHTML = data.text;
                document.getElementById('mission-icon').innerText = data.icon;
                ui.style.opacity = "1";
            }, 200);
        }

        function handleComplete() {
            if (navigator.vibrate) navigator.vibrate([30, 50, 30]);
            gameState.missionsCompleted++;

            if (gameState.missionsCompleted === 3) {
                nav('alert-screen');
                setTimeout(() => { updateMissionUI(); nav('mission'); }, 2000);
            } else if (gameState.missionsCompleted > 3) {
                showFinalVictory();
            } else {
                setTimeout(() => { updateMissionUI(); }, 300);
            }
        }

        function showFinalVictory() {
            const randomBadge = badges[Math.floor(Math.random() * badges.length)];
            const randomTeaser = teasers[Math.floor(Math.random() * teasers.length)];

            // Salva nella memoria di sessione
            sessionMemory.lastBadge = randomBadge;
            sessionMemory.hasPlayed = true;

            document.getElementById('badge-display').innerText = randomBadge;
            document.getElementById('teaser-text').innerText = randomTeaser;
            nav('end-screen');
        }

        function resetAndHome() {
            gameState.missionsCompleted = 0;
            
            // Aggiorna la Home con i dati in memoria
            if (sessionMemory.hasPlayed) {
                document.getElementById('welcome-container').style.display = "block";
            }
            if (sessionMemory.lastBadge) {
                document.getElementById('history-badge-name').innerText = sessionMemory.lastBadge;
                document.getElementById('last-badge-info').style.display = "block";
            }

            nav('home');
        }

        function nav(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            const target = document.getElementById(screenId);
            if (target) target.classList.add('active');
        }

        document.addEventListener('touchstart', (e) => { if (e.touches.length > 1) e.preventDefault(); }, { passive: false });
    </script>
</body>
</html>
