<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="theme-color" content="#0B1220"/>
<title>SparkPlay — Cosmo Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg: #050810;
  --panel: rgba(13, 20, 38, 0.7);
  --accent: #4F46E5;
  --accent-glow: rgba(79, 70, 229, 0.4);
  --gold: #F59E0B;
  --text: #F8FAFC;
  --text-muted: #94A3B8;
  --border: rgba(255, 255, 255, 0.08);
}

* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

body {
  margin: 0; padding: 0;
  background: var(--bg);
  font-family: 'Plus Jakarta Sans', sans-serif;
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
  display: flex; justify-content: center;
}

/* --- EFFETTO WOW: SFONDO DINAMICO --- */
.space-bg {
  position: fixed; inset: 0; z-index: -1;
  background: radial-gradient(circle at 50% 50%, #111827 0%, #050810 100%);
}
.stars {
  position: absolute; width: 200%; height: 200%;
  background-image: radial-gradient(1px 1px at 20px 30px, #eee, rgba(0,0,0,0)), 
                    radial-gradient(1.5px 1.5px at 100px 150px, #fff, rgba(0,0,0,0));
  background-size: 200px 200px;
  animation: rotateSpace 180s linear infinite;
  opacity: 0.4;
}
@keyframes rotateSpace { from {transform: rotate(0deg);} to {transform: rotate(360deg);} }

.nebula {
  position: absolute; width: 100%; height: 100%;
  background: radial-gradient(circle at 80% 20%, rgba(79, 70, 229, 0.15), transparent 40%),
              radial-gradient(circle at 20% 80%, rgba(245, 158, 11, 0.08), transparent 40%);
  filter: blur(80px);
}

/* --- LAYOUT --- */
.app-container {
  width: 100%; max-width: 480px;
  padding: 20px 16px env(safe-area-inset-bottom);
  position: relative;
}

.glass-card {
  background: var(--panel);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid var(--border);
  border-radius: 32px;
  padding: 24px;
  box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
}

/* --- HEADER & STATS --- */
.header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
.logo { font-weight: 800; letter-spacing: 2px; font-size: 14px; color: var(--text-muted); }

.stats-bar {
  display: flex; gap: 10px; margin-bottom: 15px;
}
.stat-pill {
  background: rgba(255,255,255,0.05);
  border: 1px solid var(--border);
  padding: 6px 14px; border-radius: 99px;
  font-size: 12px; font-weight: 700;
  display: flex; align-items: center; gap: 6px;
}

/* --- PROGRESS --- */
.prog-track { width: 100%; height: 6px; background: rgba(255,255,255,0.05); border-radius: 10px; margin: 15px 0; overflow: hidden; }
.prog-fill { height: 100%; background: linear-gradient(90deg, var(--accent), #818CF8); transition: width 0.6s cubic-bezier(0.34, 1.56, 0.64, 1); }

/* --- BOTTONI PRO --- */
.btn {
  width: 100%; border: none; border-radius: 20px;
  padding: 18px; font-weight: 800; font-size: 16px;
  cursor: pointer; transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  display: flex; align-items: center; justify-content: center; gap: 10px;
  font-family: inherit;
}
.btn-primary {
  background: var(--accent); color: white;
  box-shadow: 0 10px 20px -5px var(--accent-glow);
}
.btn-primary:active { transform: scale(0.96); box-shadow: 0 5px 10px -5px var(--accent-glow); }

.btn-outline {
  background: rgba(255,255,255,0.03); color: var(--text);
  border: 1px solid var(--border);
}

/* --- ANIMAZIONI STATI --- */
.screen { display: none; animation: screenIn 0.4s ease forwards; }
.screen.active { display: block; }
@keyframes screenIn { from { opacity: 0; transform: translateY(10px) scale(0.98); } to { opacity: 1; transform: translateY(0) scale(1); } }

/* --- QUEST UI --- */
.step-item {
  background: rgba(255,255,255,0.03);
  margin-bottom: 8px; border-radius: 16px;
  padding: 14px; border: 1px solid transparent;
  transition: all 0.3s;
}
.step-item.active {
  background: rgba(79, 70, 229, 0.1);
  border-color: rgba(79, 70, 229, 0.3);
}
.step-num {
  width: 24px; height: 24px; background: var(--accent);
  border-radius: 6px; display: inline-flex; align-items: center; justify-content: center;
  font-size: 12px; margin-right: 10px;
}

.orb {
  width: 64px; height: 64px; border-radius: 20px;
  background: linear-gradient(135deg, var(--accent), #818CF8);
  display: flex; align-items: center; justify-content: center;
  font-size: 32px; margin-bottom: 16px;
  box-shadow: 0 15px 30px -10px var(--accent-glow);
  animation: float 3s ease-in-out infinite;
}
@keyframes float { 0%,100% {transform: translateY(0);} 50% {transform: translateY(-8px);} }

.diary-item {
    background: rgba(255,255,255,0.02);
    border: 1px solid var(--border);
    border-radius: 16px; padding: 12px; margin-bottom: 8px;
    display: flex; justify-content: space-between; align-items: center;
}

</style>
</head>
<body>

<div class="space-bg"><div class="stars"></div><div class="nebula"></div></div>

<div id="APP" class="app-container"></div>

<script>
const DB = {
    small: [
        {id:"s1", emoji:"📡", title:"Antenna Stellare", goal:"Riaccendi il segnale", story:"La base è al buio. Serve la tua antenna calzino!", prop:"Un calzino", steps:["Trova l'antenna","Portala in base","Fai 3 bip"], finale:"Segnale OK", q:"A chi scrivi?"},
        {id:"s2", emoji:"🛰️", title:"Satellite Amico", goal:"Salva il satellite", story:"Un peluche fluttua lontano. Riportalo a casa.", prop:"Un peluche", steps:["Prendilo piano","Fai un giro d'orbita","Mettilo a nanna"], finale:"Orbita sicura", q:"Che nome ha?"}
    ],
    big: [
        {id:"b1", emoji:"⚙️", title:"Riparazione Motore", goal:"Sistema i motori", story:"Comandante, usa logica e silenzio per riparare tutto.", prop:"Calzino + Foglio", steps:["Muoviti in silenzio","Crea uno scudo","Sigilla il modulo"], finale:"Motore fluido", q:"Era difficile?"}
    ]
};

let state = {
    fsm: 'HOME',
    count: 0,
    age: null,
    xp: 0,
    lvl: 1,
    quest: null,
    step: 0,
    audio: true
};

// Funzioni logica
const save = () => localStorage.setItem('spark_v2', JSON.stringify(state));
const load = () => {
    const data = localStorage.getItem('spark_v2');
    if(data) state = JSON.parse(data);
};

const render = () => {
    const root = document.getElementById('APP');
    
    // Header standard
    const header = `
        <div class="header">
            <div class="logo">SPARKPLAY</div>
            <div class="stat-pill" onclick="toggleAudio()">${state.audio ? '🔊' : '🔇'}</div>
        </div>
        <div class="stats-bar">
            <div class="stat-pill" style="color:var(--gold)">⭐ LV ${state.lvl}</div>
            <div class="stat-pill">🚀 ${state.count}/3 Oggi</div>
        </div>
        <div class="prog-track"><div class="prog-fill" style="width:${(state.xp/3)*100}%"></div></div>
    `;

    if(state.fsm === 'HOME') {
        root.innerHTML = `
            ${header}
            <div class="screen active">
                <div class="glass-card">
                    <div class="orb">🌌</div>
                    <h2 style="margin:0 0 10px">Pronto, Comandante?</h2>
                    <p style="color:var(--text-muted); font-size:14px; margin-bottom:24px">Completa 3 missioni per finire il capitolo di oggi.</p>
                    <button class="btn btn-primary" onclick="startMission()">INIZIA MISSIONE</button>
                    <div style="height:12px"></div>
                    <button class="btn btn-outline" onclick="setScreen('AGE')">CAMBIA ETÀ</button>
                    <div style="height:12px"></div>
                    <button class="btn btn-outline" onclick="showDiary()">DIARIO DI BORDO</button>
                </div>
            </div>
        `;
    }

    if(state.fsm === 'AGE') {
        root.innerHTML = `
            <div class="screen active">
                <div class="glass-card" style="text-align:center">
                    <h2>Chi esplora oggi?</h2>
                    <p style="color:var(--text-muted); margin-bottom:24px">Scegli la difficoltà del viaggio</p>
                    <button class="btn btn-outline" onclick="selectAge('small')">👦 5-7 ANNI (Esploratore)</button>
                    <div style="height:12px"></div>
                    <button class="btn btn-outline" onclick="selectAge('big')">🧠 8-10 ANNI (Comandante)</button>
                </div>
            </div>
        `;
    }

    if(state.fsm === 'QUEST') {
        const q = state.quest;
        root.innerHTML = `
            <div class="screen active">
                <div class="glass-card">
                    <div style="display:flex; justify-content:space-between; align-items:flex-start">
                        <div>
                            <span style="font-size:12px; font-weight:800; color:var(--accent)">MISSIONE ATTIVA</span>
                            <h2 style="margin:4px 0 20px">${q.emoji} ${q.title}</h2>
                        </div>
                        <div class="orb" style="width:44px; height:44px; font-size:20px; margin:0">${q.emoji}</div>
                    </div>
                    
                    <div style="background:rgba(255,255,255,0.03); padding:16px; border-radius:16px; margin-bottom:20px">
                        <p style="margin:0; font-size:14px; line-height:1.6">${q.story}</p>
                    </div>

                    <div style="border-left:3px solid var(--accent); padding-left:15px; margin-bottom:20px">
                        <span style="font-size:12px; font-weight:800; color:var(--text-muted)">COSA SERVE</span>
                        <div style="font-weight:700">🎒 ${q.prop}</div>
                    </div>

                    <div style="margin-bottom:24px">
                        ${q.steps.map((s, i) => `
                            <div class="step-item ${state.step === i ? 'active' : ''}">
                                <span class="step-num">${i+1}</span>
                                <span style="font-size:14px; font-weight:${state.step === i ? '700' : '400'}">${s}</span>
                            </div>
                        `).join('')}
                    </div>

                    <div class="stats-bar">
                        ${state.step > 0 ? `<button class="btn btn-outline" style="flex:1" onclick="prevStep()">Indietro</button>` : ''}
                        <button class="btn btn-primary" style="flex:2" onclick="${state.step < q.steps.length-1 ? 'nextStep()' : 'completeQuest()'}">
                            ${state.step < q.steps.length-1 ? 'Avanti' : 'Finito!'}
                        </button>
                    </div>
                </div>
            </div>
        `;
    }
};

// Actions
window.setScreen = (s) => { state.fsm = s; render(); };
window.selectAge = (a) => { state.age = a; state.fsm = 'HOME'; save(); render(); };
window.toggleAudio = () => { state.audio = !state.audio; save(); render(); };

window.startMission = () => {
    if(!state.age) return window.setScreen('AGE');
    const pool = DB[state.age];
    state.quest = pool[Math.floor(Math.random()*pool.length)];
    state.step = 0;
    state.fsm = 'QUEST';
    if(state.audio) speak(`Missione: ${state.quest.title}. Prendi ${state.quest.prop}`);
    render();
};

window.nextStep = () => {
    state.step++;
    if(state.audio) speak(state.quest.steps[state.step]);
    render();
};

window.prevStep = () => {
    state.step--;
    render();
};

window.completeQuest = () => {
    state.count++;
    state.xp++;
    if(state.xp >= 3) { state.lvl++; state.xp = 0; }
    state.fsm = 'HOME';
    if(state.audio) speak("Ottimo lavoro! Missione compiuta.");
    save();
    render();
};

const speak = (txt) => {
    if(!window.speechSynthesis) return;
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(txt);
    u.lang = 'it-IT';
    u.rate = 0.9;
    window.speechSynthesis.speak(u);
};

// Init
load();
render();

</script>
</body>
</html>
