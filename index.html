<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>SparkPlay</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">

<style>
:root{
  --rossa:#ff5e6c; --blu:#00d2ff; --giallo:#ffe66d;
  --sfondo:#0a1128; --latte:#f7fff7;
}
*{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body{
  margin:0; background:var(--sfondo); font-family:'Quicksand', sans-serif; color:var(--latte);
  height:100vh; overflow:hidden;
  background-image: radial-gradient(circle at 50% 45%, #16224f 0%, var(--sfondo) 70%);
}
.sp-root{
  max-width:600px; margin:0 auto; height:100vh; display:flex; flex-direction:column;
  padding: env(safe-area-inset-top) 22px env(safe-area-inset-bottom);
  position:relative;
}
.sp-top{
  display:flex; justify-content:space-between; align-items:center;
  padding:18px 0 10px;
}
.brand{
  font-family:'Fredoka One', cursive; font-size:34px; color:var(--giallo);
  text-shadow:3px 3px var(--rossa);
}
.btn{
  border:none; cursor:pointer; border-radius:20px;
  font-family:'Fredoka One', cursive; transition:0.2s;
}
.btn:active{ transform: translateY(2px); }
.btn-ghost{ background:rgba(255,255,255,0.10); color:white; padding:10px 14px; }
.btn-danger{ background:var(--rossa); color:white; padding:10px 14px; }
.btn-avanti{
  background:var(--rossa); color:white; padding:18px; width:100%; font-size:18px;
  box-shadow:0 6px 0 #c43d4a;
}
.btn-avanti:active{ transform: translateY(4px); box-shadow:0 2px 0 #c43d4a; }

@keyframes pulseSpark{ 0%{transform:scale(1)} 50%{transform:scale(1.05)} 100%{transform:scale(1)} }
.pulse{ animation:pulseSpark 2s infinite; }

.content-area{
  flex:1; display:flex; flex-direction:column; justify-content:center; gap:16px;
}
.card{
  background:rgba(255,255,255,0.08); border-radius:26px; padding:18px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.25);
}
.center{ text-align:center; }

.multiverso-container{
  width:190px; height:190px; margin:0 auto 8px; position:relative;
  display:flex; align-items:center; justify-content:center;
}
.icona-mondo{ position:absolute; font-size:48px; animation:orbitaMondi 8s linear infinite; }
.mondo-1{ animation-delay:0s; }
.mondo-2{ animation-delay:-2.66s; }
.mondo-3{ animation-delay:-5.33s; }
@keyframes orbitaMondi{
  from{ transform: rotate(0deg) translateX(68px) rotate(0deg); }
  to{ transform: rotate(360deg) translateX(68px) rotate(-360deg); }
}
.centro-spark{
  width:60px; height:60px; background:white; border-radius:50%;
  box-shadow:0 0 30px var(--giallo);
  display:flex; align-items:center; justify-content:center; font-size:30px;
}

.progress-wrap{ width:100%; max-width:460px; margin:0 auto; }
.progress-row{
  display:flex; justify-content:space-between; align-items:center; margin-top:10px;
  opacity:0.88; font-weight:700;
}
.progress-outer{
  background:rgba(255,255,255,0.12); border-radius:12px; height:10px; overflow:hidden;
}
.progress-inner{
  background:var(--giallo); height:100%; width:0%; transition:0.25s;
}

.testo-storia{ font-size:20px; line-height:1.35; text-align:center; }
.obiettivo-box{
  border:3px dashed var(--blu); border-radius:22px; padding:14px; text-align:center;
  font-weight:700; color:var(--blu); background:rgba(0,210,255,0.05);
}
.passo{
  padding:16px; border-radius:22px; background:rgba(255,255,255,0.08);
  display:flex; gap:12px; margin-bottom:10px; font-weight:700;
  align-items:flex-start;
}
.passo.attivo{
  background:var(--latte); color:var(--sfondo); transform:scale(1.02);
}
.passo .num{
  background:var(--rossa); color:white; width:30px; height:30px; border-radius:50%;
  display:flex; align-items:center; justify-content:center; flex:0 0 auto;
}

.grid2{ display:grid; grid-template-columns:1fr 1fr; gap:14px; }
.world-card{
  border-radius:26px; padding:18px; cursor:pointer; text-align:left;
  background:rgba(255,255,255,0.08);
  border:2px solid rgba(255,255,255,0.10);
}
.world-card .emoji{ font-size:44px; }
.world-card .name{ font-family:'Fredoka One'; font-size:22px; margin-top:8px; }
.world-card .desc{ opacity:0.75; margin-top:6px; font-weight:700; font-size:13px; line-height:1.25; }
.world-card.disabled{ opacity:0.45; filter:saturate(0.6); cursor:not-allowed; }
.badge{
  display:inline-block; margin-top:10px; padding:6px 10px; border-radius:999px;
  font-weight:800; font-size:12px;
  background:rgba(255,255,255,0.12);
}

#splash-screen{
  position:fixed; inset:0; z-index:5000;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  background: radial-gradient(circle at 50% 35%, #1b2a66 0%, var(--sfondo) 70%);
  color: var(--latte);
}
#splash-screen .logo{
  font-family:'Fredoka One', cursive; font-size:44px; color:var(--giallo);
  text-shadow:3px 3px var(--rossa); margin-top:8px;
}
#splash-screen .sub{ opacity:0.7; margin-top:6px; font-weight:700; }

#diario-modal{
  position:fixed; inset:0; z-index:4000;
  display:none; flex-direction:column; padding: 30px 20px;
  background: linear-gradient(180deg, #101a3b, var(--sfondo));
  overflow-y:auto;
}
.scheda-ricordo{
  background:rgba(255,255,255,0.08); padding:18px; border-radius:24px; margin-bottom:12px;
  border-left:8px solid var(--blu); display:flex; gap:14px; align-items:center;
}
.emoji-diario{ font-size:28px; opacity:0.9; }
.testo-diario b{ display:block; font-size:18px; color:var(--giallo); }
.testo-diario small{ opacity:0.6; font-size:12px; }

#overlay-success{
  position:fixed; inset:0; z-index:4500;
  display:none; align-items:center; justify-content:center;
  background:rgba(10,17,40,0.90);
}
.messaggio-vittoria{
  font-family:'Fredoka One'; font-size:46px; color:var(--giallo);
  text-shadow:4px 4px var(--rossa); text-align:center;
}
.cascata{ position:absolute; top:-20px; pointer-events:none; animation:caduta 2s linear forwards; font-size:28px; }
@keyframes caduta{ to{ transform:translateY(110vh) rotate(360deg); opacity:0; } }

small.mini{ opacity:0.6; font-weight:700; font-size:12px; }
</style>
</head>

<body>
<div id="splash-screen" aria-hidden="true">
  <div style="font-size:54px; filter: drop-shadow(0 10px 20px rgba(0,0,0,0.35));">✨</div>
  <div class="logo">SparkPlay</div>
  <div class="sub">Preparando la missione…</div>
</div>

<div id="overlay-success"><div class="messaggio-vittoria">MISSIONE<br>COMPLETATA!</div></div>

<div id="diario-modal">
  <div class="sp-top">
    <div class="brand" style="font-size:26px">I TUOI RICORDI</div>
    <button class="btn btn-danger" onclick="chiudiDiario()">CHIUDI</button>
  </div>
  <div id="lista-diario" style="margin-top:16px; padding-bottom:30px;"></div>
</div>

<div id="SPARKPLAY_APP" class="sp-root"></div>

const SPACE_ORDER = [
  "allarme_base",
  "ripara_antenna",
  "rifornimento_energia",
  "campo_asteroidi",
  "gravita_zero",
  "stazione_spaziale",
  "sistema_solare",
  "sos_pianeta_ghiaccio",
  "codice_segreto",
  "atterraggio_precisione"
];

function buildMissionByAge(m, eta){
  const ch = m.challenge?.[eta] ? `Sfida (${eta}): ${m.challenge[eta]}` : "";
  const cap = m.chapter ? `${m.chapter}` : "";
  const passi = [
    cap,
    `Setup: ${m.setup}`,
    ...m.steps.map((x,i)=>`Passo ${i+1}: ${x}`),
    ch,
    `Successo: ${m.success || "Missione completata!"}`
  ].filter(Boolean);

  return { t: m.t, s: m.s, o: m.o, p: passi };
}

/* =========================
   Stato + Persistenza
   ========================= */

const FRASI = [
  "L'immaginazione è l'unica astronave che arriva ovunque.",
  "Piccoli passi. Grandi avventure.",
  "Oggi una missione. Domani un mondo.",
  "Gioca con ciò che hai: è più potente di ciò che compri."
];

let s = {
  fsm: "INIZIO",
  world: "spazio",
  eta: null,
  passo: 0,
  missioneAttuale: null,
  missioneIsSpeciale: false,

  audio: false,
  diario: [],

  // giornaliero (Montessori)
  oggiKey: "",
  oggiFatte: 0,
  oggiLimite: 3,
  extraSbloccate: 0,
  specialeFattaOggi: false,

  // campagna (progressione, non si resetta ogni giorno)
  storyIndex: 0,

  // gate
  gateTipo: null,
  gateErrore: ""
};

function oggiKey(){
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
}
function limiteOggi(){ return s.oggiLimite + s.extraSbloccate; }

function caricaStatoGiorno(){
  s.oggiKey = oggiKey();
  const saved = JSON.parse(localStorage.getItem("sparkplay_day") || "{}");
  if(saved.key === s.oggiKey){
    s.oggiFatte = Number(saved.oggiFatte || 0);
    s.extraSbloccate = Number(saved.extraSbloccate || 0);
    s.specialeFattaOggi = !!saved.specialeFattaOggi;
  } else {
    s.oggiFatte = 0;
    s.extraSbloccate = 0;
    s.specialeFattaOggi = false;
    salvaStatoGiorno();
  }
}
function salvaStatoGiorno(){
  localStorage.setItem("sparkplay_day", JSON.stringify({
    key: s.oggiKey,
    oggiFatte: s.oggiFatte,
    extraSbloccate: s.extraSbloccate,
    specialeFattaOggi: s.specialeFattaOggi
  }));
}
function caricaCampagna(){
  const key = "sparkplay_campaign";
  const saved = JSON.parse(localStorage.getItem(key) || "{}");
  const w = saved[s.world];
  s.storyIndex = Number.isFinite(w?.storyIndex) ? w.storyIndex : 0;
}
function salvaCampagna(){
  const key = "sparkplay_campaign";
  const saved = JSON.parse(localStorage.getItem(key) || "{}");
  saved[s.world] = { storyIndex: s.storyIndex };
  localStorage.setItem(key, JSON.stringify(saved));
}
function caricaPreferenze(){
  const a = localStorage.getItem("sparkplay_audio");
  s.audio = (a === "1");
  const d = localStorage.getItem("sparkplay_diario");
  s.diario = d ? JSON.parse(d) : [];
}

/* =========================
   Effetti + Voce
   ========================= */

function creaStelle(n=18){
  for(let i=0;i<n;i++){
    const el = document.createElement("div");
    el.className = "cascata";
    el.textContent = "✨";
    el.style.left = (Math.random()*100) + "vw";
    el.style.animationDuration = (1.2 + Math.random()*1.4) + "s";
    document.body.appendChild(el);
    setTimeout(()=>el.remove(), 2200);
  }
}
function vibra(){
  try{ if(navigator.vibrate) navigator.vibrate([180,80,180]); }catch(e){}
}
function parla(testo, onEnd){
  if(!s.audio){ if(onEnd) onEnd(); return; }
  try{ speechSynthesis.cancel(); }catch(e){}
  const u = new SpeechSynthesisUtterance(testo);
  u.lang="it-IT"; u.rate=0.92;
  if(onEnd) u.onend = onEnd;
  try{ speechSynthesis.speak(u); }catch(e){}
}

/* =========================
   UI
   ========================= */

function progressPercent(){
  return Math.min(100, (s.oggiFatte / Math.max(1, limiteOggi())) * 100);
}

function disegna(){
  const root = document.getElementById("SPARKPLAY_APP");

  if(s.fsm === "INIZIO"){
    const frase = FRASI[Math.floor(Math.random()*FRASI.length)];
    root.innerHTML = `
      <div class="sp-top">
        <button class="btn btn-ghost" style="font-size:22px" onclick="apriDiario()">📚</button>
        <div class="brand">SPARKPLAY</div>
        <button class="btn btn-ghost" style="font-size:22px" onclick="toggleAudio()">${s.audio?'🔊':'🔈'}</button>
      </div>

      <div class="content-area">
        <div class="multiverso-container">
          <div class="centro-spark">✨</div>
          <div class="icona-mondo mondo-1">🚀</div>
          <div class="icona-mondo mondo-2">🪄</div>
          <div class="icona-mondo mondo-3">🔍</div>
        </div>

        <h1 class="center" style="color:var(--giallo); font-size:52px; margin:0;">PRONTI?</h1>
        <div class="center" style="opacity:0.75; font-weight:700;">${frase}</div>

        <div class="progress-wrap">
          <div class="progress-row">
            <span>OGGI: <span id="count-oggi">${s.oggiFatte}</span>/${limiteOggi()}</span>
            <span class="mini">Limite genitore</span>
          </div>
          <div class="progress-outer">
            <div id="barraMissioni" class="progress-inner" style="width:${progressPercent()}%"></div>
          </div>
        </div>

        <button class="btn btn-avanti pulse" style="width:88%; margin:10px auto 0;" onclick="vaiMondi()">
          SCEGLI MONDO 🌍
        </button>

        <div class="center" style="opacity:0.55; font-size:12px;">
          ${s.oggiFatte >= limiteOggi()
            ? "Hai finito le missioni di oggi. Chiedi al genitore per sbloccare."
            : "Missioni con oggetti di casa. Sicure. Creative. Veloci da iniziare."}
        </div>
      </div>
    `;
    return;
  }

  if(s.fsm === "MONDI"){
    root.innerHTML = `
      <div class="sp-top">
        <button class="btn btn-ghost" onclick="home()">⬅︎</button>
        <div class="brand" style="font-size:26px">SCEGLI UN MONDO</div>
        <button class="btn btn-ghost" style="font-size:22px" onclick="toggleAudio()">${s.audio?'🔊':'🔈'}</button>
      </div>

      <div class="content-area">
        <div class="grid2">
          <div class="world-card" onclick="scegliMondo('spazio')">
            <div class="emoji">🚀</div>
            <div class="name">Spazio</div>
            <div class="desc">Campagna completa. Missioni strutturate. Progressione.</div>
            <div class="badge">DISPONIBILE</div>
          </div>

          <div class="world-card disabled">
            <div class="emoji">🔍</div>
            <div class="name">Detective</div>
            <div class="desc">Indizi, mappe, misteri. In arrivo.</div>
            <div class="badge">IN ARRIVO</div>
          </div>

          <div class="world-card disabled">
            <div class="emoji">🪄</div>
            <div class="name">Magia</div>
            <div class="desc">Incantesimi, rituali, missioni creative. In arrivo.</div>
            <div class="badge">IN ARRIVO</div>
          </div>
        </div>

        <div class="card">
          <div class="center" style="font-weight:800; opacity:0.9;">✨ Consiglio SparkPlay</div>
          <div class="center" style="opacity:0.75; margin-top:8px;">
            Lascia scegliere il mondo al bambino. Il limite giornaliero mantiene il ritmo sano.
          </div>
        </div>
      </div>
    `;
    return;
  }

  if(s.fsm === "ETA"){
    root.innerHTML = `
      <div class="sp-top">
        <button class="btn btn-ghost" onclick="vaiMondi()">⬅︎</button>
        <div class="brand" style="font-size:26px">QUANTI ANNI?</div>
        <button class="btn btn-ghost" style="font-size:22px" onclick="toggleAudio()">${s.audio?'🔊':'🔈'}</button>
      </div>

      <div class="content-area">
        <button class="btn" style="background:rgba(0,210,255,0.15); border:3px solid var(--blu); color:white;
          padding:22px; font-size:22px; border-radius:26px; display:flex; align-items:center; justify-content:space-between;"
          onclick="scegliEta('5-7')">
          <span style="font-size:38px;">🚀</span>
          <div style="text-align:right;">
            <b>ESPLORATORE</b><br><small class="mini">5-7 ANNI</small>
          </div>
        </button>

        <button class="btn" style="background:rgba(255,94,108,0.15); border:3px solid var(--rossa); color:white;
          padding:22px; font-size:22px; border-radius:26px; display:flex; align-items:center; justify-content:space-between;"
          onclick="scegliEta('8-10')">
          <span style="font-size:38px;">🧠</span>
          <div style="text-align:right;">
            <b>COMANDANTE</b><br><small class="mini">8-10 ANNI</small>
          </div>
        </button>

        <div class="center" style="opacity:0.6; font-size:12px;">
          Le missioni sono le stesse, ma la difficoltà cambia con l’età.
        </div>
      </div>
    `;
    return;
  }

  if(s.fsm === "GIOCO"){
    const m = s.missioneAttuale;
    root.innerHTML = `
      <div class="sp-top">
        <button class="btn btn-ghost" style="font-size:22px" onclick="toggleAudio()">${s.audio?'🔊':'🔈'}</button>
        <div class="brand" style="font-size:18px">${m.t}</div>
        <button class="btn btn-ghost" onclick="home()">ESCI</button>
      </div>

      <div class="content-area">
        <div class="testo-storia">${m.s}</div>
        <div class="obiettivo-box">OBIETTIVO: ${m.o}</div>

        <div class="card" style="padding:16px;">
          ${m.p.map((t,i)=>`
            <div class="passo ${i===s.passo?'attivo':''}">
              <div class="num">${i+1}</div>
              <div>${t}</div>
            </div>`).join("")}
        </div>

        <div style="display:flex; gap:12px;">
          <button class="btn btn-ghost" style="flex:1; padding:14px;" onclick="precedente()" ${s.passo===0?'disabled style="opacity:0.4; flex:1; padding:14px;"':''}>INDIETRO</button>
          <button class="btn btn-avanti" style="flex:2;" onclick="successivo()">
            ${s.passo < m.p.length-1 ? "AVANTI" : "COMPLETA ✅"}
          </button>
        </div>
      </div>
    `;
    return;
  }

  if(s.fsm === "SCELTA_GENITORE"){
    const sbloccabileSpeciale = (s.oggiFatte >= 3) && !s.specialeFattaOggi;
    root.innerHTML = `
      <div class="sp-top">
        <div class="brand" style="font-size:26px">GENITORE</div>
        <button class="btn btn-ghost" onclick="home()">CHIUDI</button>
      </div>

      <div class="content-area">
        <div class="card center">
          <h2 style="margin:0; font-family:'Fredoka One'; color:var(--giallo); font-size:30px;">CAPITOLO FINITO! 🏆</h2>
          <div style="margin-top:8px; opacity:0.85; font-weight:800;">
            Oggi: <b>${s.oggiFatte}</b>/${limiteOggi()} missioni
          </div>
          <div style="margin-top:10px; opacity:0.65; font-weight:700; font-size:12px;">
            Serve un genitore per mantenere un ritmo sano (limite giornaliero).
          </div>
        </div>

        ${sbloccabileSpeciale ? `
          <button class="btn" style="background:var(--blu); color:white; padding:18px; width:100%; font-size:18px; border-radius:22px;"
            onclick="apriGate('SPECIALE')">MISSIONE SPECIALE 🤝</button>
        ` : `
          <div class="center" style="opacity:0.65; font-weight:800;">
            ${s.specialeFattaOggi ? "🌟 Missione speciale: già fatta oggi." : "🌟 Missione speciale: si sblocca dopo 3 missioni."}
          </div>
        `}

        <button class="btn btn-ghost" style="padding:18px; width:100%; font-size:16px;" onclick="apriGate('ALTRE')">
          SBLOCCA ALTRE 3 🚀
        </button>

        <button class="btn btn-danger" style="padding:16px; width:100%; font-size:16px;" onclick="home()">FINISCI PER OGGI</button>
      </div>
    `;
    return;
  }

  if(s.fsm === "GATE"){
    const titolo = (s.gateTipo==="SPECIALE") ? "SBLOCCA MISSIONE SPECIALE" : "SBLOCCA ALTRE 3";
    root.innerHTML = `
      <div class="sp-top">
        <div class="brand" style="font-size:26px">GENITORE</div>
        <button class="btn btn-ghost" onclick="annullaGate()">ANNULLA</button>
      </div>

      <div class="content-area">
        <div class="card center">
          <div style="font-family:'Fredoka One'; color:var(--giallo); font-size:22px;">${titolo}</div>
          <div style="opacity:0.75; font-weight:800; margin-top:8px;">Quanto fa <span style="color:var(--giallo)">5 + 5</span>?</div>

          <input id="gate-input" inputmode="numeric" pattern="[0-9]*" placeholder="Risposta"
            style="width:100%; margin-top:14px; padding:16px; border-radius:18px; border:2px solid rgba(255,255,255,0.18);
            background:rgba(0,0,0,0.25); color:white; font-size:18px; text-align:center; outline:none;" />

          ${s.gateErrore ? `<div style="margin-top:10px; color:var(--rossa); font-weight:900;">${s.gateErrore}</div>` : ""}

          <button class="btn btn-avanti" style="margin-top:14px;" onclick="verificaGate()">CONFERMA ✅</button>

          <div style="opacity:0.55; font-weight:700; margin-top:10px; font-size:12px;">
            Gate semplice per evitare sblocchi accidentali.
          </div>
        </div>
      </div>
    `;
    return;
  }
}

/* =========================
   Azioni
   ========================= */

window.home = ()=>{ s.fsm="INIZIO"; s.passo=0; s.missioneAttuale=null; disegna(); };
window.vaiMondi = ()=>{
  if(s.oggiFatte >= limiteOggi()){
    s.fsm="SCELTA_GENITORE";
  } else {
    s.fsm="MONDI";
  }
  disegna();
};

window.scegliMondo = (w)=>{
  if(w!=="spazio") return;
  s.world = w;
  caricaCampagna();
  s.fsm = "ETA";
  disegna();
  parla("Benvenuto nel mondo Spazio. Attenzione astronauta… missione in arrivo.");
};

window.scegliEta = (eta)=>{
  s.eta = eta;
  if(s.oggiFatte >= limiteOggi()){
    s.fsm="SCELTA_GENITORE";
    disegna();
    return;
  }
  proproxima();
};

window.toggleAudio = ()=>{
  s.audio = !s.audio;
  localStorage.setItem("sparkplay_audio", s.audio ? "1":"0");
  if(s.audio) parla("Audio attivato");
  else { try{ speechSynthesis.cancel(); }catch(e){} }
  disegna();
};

window.apriDiario = ()=>{
  const l = document.getElementById("lista-diario");
  l.innerHTML = s.diario.length
    ? s.diario.map(m => `
      <div class="scheda-ricordo">
        <div class="emoji-diario">📖</div>
        <div class="testo-diario">
          <small>${m.data}</small>
          <b>${m.titolo}</b>
        </div>
      </div>`).join("")
    : "<p class='center' style='opacity:0.65; font-weight:800;'>Il diario è vuoto.</p>";
  document.getElementById("diario-modal").style.display="flex";
};
window.chiudiDiario = ()=>{ document.getElementById("diario-modal").style.display="none"; };

window.apriGate = (tipo)=>{ s.gateTipo=tipo; s.gateErrore=""; s.fsm="GATE"; disegna(); };
window.annullaGate = ()=>{ s.fsm="SCELTA_GENITORE"; disegna(); };

window.verificaGate = ()=>{
  const v = (document.getElementById("gate-input")?.value || "").trim();
  if(v !== "10"){
    s.gateErrore = "Risposta errata. Riprova 🙂";
    disegna();
    return;
  }

  if(s.gateTipo === "ALTRE"){
    s.extraSbloccate += 3;
    salvaStatoGiorno();
    proproxima();
    return;
  }

  if(s.gateTipo === "SPECIALE"){
    if(s.specialeFattaOggi){
      s.gateErrore = "Missione speciale già fatta oggi.";
      disegna();
      return;
    }
    s.specialeFattaOggi = true;
    salvaStatoGiorno();
    s.missioneIsSpeciale = true;
    s.missioneAttuale = DB.speciale;
    s.passo = 0;
    s.fsm = "GIOCO";
    disegna();
    parla("Missione speciale. " + s.missioneAttuale.s + " Obiettivo: " + s.missioneAttuale.o + ". " + s.missioneAttuale.p[0]);
    return;
  }
};

function proproxima(){
  if(!s.eta){ s.fsm="ETA"; disegna(); return; }
  if(s.oggiFatte >= limiteOggi()){ s.fsm="SCELTA_GENITORE"; disegna(); return; }

  const key = SPACE_ORDER[s.storyIndex % SPACE_ORDER.length];
  const m = DB.spazio[key];
  s.missioneIsSpeciale = false;
  s.missioneAttuale = buildMissionByAge(m, s.eta);
  s.passo = 0;
  s.fsm = "GIOCO";
  disegna();

  parla("Attenzione astronauta. " + s.missioneAttuale.s + " Obiettivo: " + s.missioneAttuale.o + ". " + s.missioneAttuale.p[0]);
}

window.precedente = ()=>{
  if(s.passo <= 0) return;
  s.passo--;
  disegna();
  parla(s.missioneAttuale.p[s.passo]);
};

window.successivo = ()=>{
  const m = s.missioneAttuale;
  if(s.passo < m.p.length - 1){
    s.passo++;
    disegna();
    parla(m.p[s.passo]);
    return;
  }

  document.getElementById("overlay-success").style.display = "flex";
  creaStelle(22);
  vibra();

  s.diario.unshift({ titolo: m.t, data: new Date().toLocaleDateString("it-IT") });
  localStorage.setItem("sparkplay_diario", JSON.stringify(s.diario));

  setTimeout(()=>{
    document.getElementById("overlay-success").style.display = "none";

    if(s.missioneIsSpeciale){
      s.fsm = "SCELTA_GENITORE";
      disegna();
      parla("Missione speciale completata. Ottimo lavoro astronauti!");
      return;
    }

    s.oggiFatte++;
    salvaStatoGiorno();

    s.storyIndex++;
    salvaCampagna();

    if(s.oggiFatte >= limiteOggi()){
      s.fsm = "SCELTA_GENITORE";
      disegna();
      parla("Missione completata. Ora serve un genitore per continuare.");
      return;
    }

    proproxima();
  }, 1600);
};

/* =========================
   Bootstrap
   ========================= */

function caricaPreferenze(){
  const a = localStorage.getItem("sparkplay_audio");
  s.audio = (a === "1");
  const d = localStorage.getItem("sparkplay_diario");
  s.diario = d ? JSON.parse(d) : [];
}
function caricaStatoGiorno(){
  s.oggiKey = oggiKey();
  const saved = JSON.parse(localStorage.getItem("sparkplay_day") || "{}");
  if(saved.key === s.oggiKey){
    s.oggiFatte = Number(saved.oggiFatte || 0);
    s.extraSbloccate = Number(saved.extraSbloccate || 0);
    s.specialeFattaOggi = !!saved.specialeFattaOggi;
  } else {
    s.oggiFatte = 0;
    s.extraSbloccate = 0;
    s.specialeFattaOggi = false;
    salvaStatoGiorno();
  }
}
function salvaStatoGiorno(){
  localStorage.setItem("sparkplay_day", JSON.stringify({
    key: s.oggiKey,
    oggiFatte: s.oggiFatte,
    extraSbloccate: s.extraSbloccate,
    specialeFattaOggi: s.specialeFattaOggi
  }));
}
function caricaCampagna(){
  const key = "sparkplay_campaign";
  const saved = JSON.parse(localStorage.getItem(key) || "{}");
  const w = saved[s.world];
  s.storyIndex = Number.isFinite(w?.storyIndex) ? w.storyIndex : 0;
}
function salvaCampagna(){
  const key = "sparkplay_campaign";
  const saved = JSON.parse(localStorage.getItem(key) || "{}");
  saved[s.world] = { storyIndex: s.storyIndex };
  localStorage.setItem(key, JSON.stringify(saved));
}

caricaPreferenze();
caricaStatoGiorno();
caricaCampagna();

window.addEventListener("load", ()=>{
  const splash = document.getElementById("splash-screen");
  if(splash) setTimeout(()=>{ splash.style.display="none"; }, 900);
  try{ window.speechSynthesis?.getVoices?.(); }catch(e){}
});

disegna();

})();</script>
</body>
</html>
