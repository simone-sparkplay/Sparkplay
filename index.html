<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SparkPlay</title>

<style>
:root{
--bg:#060814;
--violet:#7c4dff;
--gold:#ffdb58;
--text:#fff;
}

body{
margin:0;
font-family:system-ui;
background:radial-gradient(circle,#161b3d,#060814);
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;
}

.screen{
display:none;
flex-direction:column;
align-items:center;
justify-content:center;
text-align:center;
position:absolute;
width:100%;
height:100%;
}

.screen.active{display:flex;}

h1{
font-size:42px;
margin:0;
background:linear-gradient(#fff,#c0a4ff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.btn{
background:linear-gradient(#b37cff,#7c4dff);
border:none;
padding:18px 40px;
border-radius:40px;
font-size:18px;
color:white;
margin-top:30px;
box-shadow:0 8px 0 #4a2d7a;
}

.btn:active{
transform:translateY(6px);
box-shadow:0 2px 0 #4a2d7a;
}

.portal{
background:rgba(255,255,255,0.08);
padding:40px;
border-radius:30px;
cursor:pointer;
}

.card{
background:rgba(255,255,255,0.08);
padding:30px;
border-radius:30px;
}

.badge{
background:var(--violet);
padding:6px 20px;
border-radius:20px;
font-size:12px;
position:absolute;
top:-15px;
left:50%;
transform:translateX(-50%);
}

.icon{
width:110px;
height:110px;
margin-bottom:20px;
}

@keyframes float{
0%,100%{transform:translateY(0)}
50%{transform:translateY(-10px)}
}

@keyframes spin{
from{transform:rotate(0)}
to{transform:rotate(360deg)}
}

@keyframes blink{
0%,95%,100%{opacity:1}
97%{opacity:0}
}

.float{animation:float 3s infinite}
.spin{animation:spin 6s linear infinite}
.blink{animation:blink 3s infinite}
</style>
</head>

<body>

<div id="home" class="screen active">
<h1>SparkPlay</h1>
<button class="btn" onclick="nav('world')">Gioca</button>
</div>

<div id="world" class="screen">
<div class="portal" onclick="start()">
<svg class="icon float" viewBox="0 0 120 120">
<path d="M60 10C60 10 80 30 80 60C80 80 70 95 70 95L80 110L60 100L40 110L50 95C50 95 40 80 40 60C40 30 60 10 60 10Z" fill="#7c4dff"/>
<circle cx="60" cy="55" r="6" fill="#060814"/>
</svg>
<div>SPAZIO</div>
</div>
<button class="btn" onclick="nav('home')">Indietro</button>
</div>

<div id="mission" class="screen">
<div class="card">
<div id="progress" class="badge">Missione 1</div>

<div id="icon"></div>

<p id="text"></p>
</div>

<button class="btn" onclick="done()">Fatto</button>
</div>

<div id="alert" class="screen">
<svg class="icon float" viewBox="0 0 120 120">
<polygon points="60,10 75,45 110,45 82,65 92,100 60,80 28,100 38,65 10,45 45,45" fill="#ffdb58"/>
</svg>
<h1>SUPER MISSIONE</h1>
</div>

<div id="end" class="screen">
<h1 id="badge"></h1>
<button class="btn" onclick="home()">Home</button>
</div>

<script>

const missions=[
"Trova qualcosa di rosso",
"Fai 5 salti",
"Cerca qualcosa di tondo"
];

let i=0;

function nav(x){
document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
document.getElementById(x).classList.add('active');
}

function start(){
i=0;
update();
nav('mission');
}

function update(){
document.getElementById('progress').innerText="Missione "+(i+1);
document.getElementById('text').innerText=missions[i]||"Super missione: costruisci base!";
document.getElementById('icon').innerHTML=getIcon();
}

function getIcon(){
return `
<svg class="icon float" viewBox="0 0 120 120">
<circle cx="60" cy="60" r="30" fill="#7c4dff"/>
<circle cx="60" cy="60" r="8" fill="#fff"/>
<circle class="blink" cx="60" cy="60" r="3" fill="#060814"/>
<circle class="spin" cx="60" cy="60" r="40" stroke="#c0a4ff" stroke-width="4" fill="none" stroke-dasharray="15 10"/>
</svg>
`;
}

function done(){
i++;
if(i==3){
nav('alert');
setTimeout(()=>{
update();
nav('mission');
},2000);
}else if(i>3){
document.getElementById('badge').innerText="EROE GALATTICO";
nav('end');
}else{
update();
}
}

function home(){
nav('home');
}

</script>

</body>
</html>
