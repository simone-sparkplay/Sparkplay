<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SparkPlay</title>
    <style>
        :root {
            --bg-space: #070a1a;
            --panel-glass: rgba(20, 26, 50, 0.7);
            --accent-magic: #a27cff;
            --accent-gold: #ffeb3b;
            --text-main: #ffffff;
            --text-soft: #94a3b8;
            --shadow-glow: 0 0 20px rgba(162, 124, 255, 0.3);
            --btn-grad: linear-gradient(180deg, #9d50bb 0%, #6e48aa 100%);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        html, body {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: var(--bg-space);
            background-image: 
                radial-gradient(circle at 50% 100%, #1a1b4a 0%, #070a1a 100%),
                radial-gradient(1px 1px at 20px 30px, white, rgba(0,0,0,0)),
                radial-gradient(1px 1px at 150px 50px, white, rgba(0,0,0,0)),
                radial-gradient(1.5px 1.5px at 100px 200px, #a27cff, rgba(0,0,0,0));
            background-size: 100% 100%, 200px 200px, 300px 300px, 250px 250px;
            color: var(--text-main);
            font-family: 'Quicksand', 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
        }

        body { display: flex; justify-content: center; align-items: center; }

        /* --- Screens --- */
        .screen {
            display: none; flex-direction: column; align-items: center; justify-content: center;
            width: 100%; height: 100%; padding: 40px; text-align: center;
            position: absolute; opacity: 0; transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            pointer-events: none;
        }

        .screen.active { display: flex; opacity: 1; pointer-events: auto; z-index: 10; transform: scale(1); }
        .screen:not(.active) { transform: scale(0.95); }

        /* --- Home Elements --- */
        h1 { 
            font-size: 3.5rem; margin: 0; letter-spacing: -1px;
            background: linear-gradient(to bottom, #fff, #a27cff);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 15px rgba(162, 124, 255, 0.5));
        }

        .tagline { color: var(--text-soft); font-size: 1.1rem; margin-top: 5px; letter-spacing: 2px; text-transform: uppercase; }

        /* --- Diario Icon (Top Right) --- */
        .diary-trigger {
            position: absolute; top: 40px; right: 30px;
            width: 50px; height: 50px; border-radius: 15px;
            background: var(--panel-glass); border: 1px solid rgba(255,255,255,0.1);
            display: flex; align-items: center; justify-content: center;
            font-size: 1.5rem; cursor: pointer; transition: all 0.3s ease;
            box-shadow: var(--shadow-glow); z-index: 100;
        }

        .diary-trigger:active { transform: scale(0.9); background: var(--accent-magic); }

        /* --- Diario Popup/Screen --- */
        .diary-modal {
            background: rgba(10, 14, 28, 0.95);
            border: 2px solid var(--accent-magic);
            border-radius: 30px; padding: 30px;
            width: 85%; max-width: 350px;
            box-shadow: 0 0 40px rgba(0,0,0,0.8), 0 0 20px rgba(162, 124, 255, 0.2);
        }

        .diary-title { color: var(--accent-magic); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 3px; margin-bottom: 20px; display: block; }
        .diary-row { display: flex; justify-content: space-between; margin: 15px 0; font-size: 0.9rem; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 8px; }
        .diary-label { color: var(--text-soft); }
        .diary-val { color: #fff; font-weight: bold; }

        /* --- Buttons --- */
        .btn-main {
            background: var(--btn-grad); color: white;
            border: none; border-radius: 40px; padding: 25px 60px;
            font-size: 1.8rem; font-weight: 800; cursor: pointer;
            box-shadow: 0 10px 0 #4a2d7a, 0 20px 40px rgba(0,0,0,0.4);
            transition: all 0.1s ease; margin-top: 50px;
            text-transform: uppercase; letter-spacing: 2px;
        }

        .btn-main:active { transform: translateY(6px); box-shadow: 0 4px 0 #4a2d7a; filter: brightness(1.1); }
        
        .btn-secondary { background: transparent; border: 2px solid rgba(255,255,255,0.1); color: #fff; padding: 15px 30px; border-radius: 20px; margin-top: 20px; cursor: pointer; }

        /* --- World Cards --- */
        .world-portal {
            background: var(--panel-glass); border-radius: 40px; padding: 50px 30px;
            border: 2px solid rgba(162, 124, 255, 0.3); width: 280px;
            cursor: pointer; transition: all 0.3s ease; position: relative;
            overflow: hidden;
        }
        .world-portal:active { transform: scale(0.96); border-color: var(--accent-magic); }
        .world-portal::after { content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: radial-gradient(circle, rgba(162,124,255,0.1) 0%, transparent 70%); pointer-events: none; }

        .icon-huge { font-size: 5rem; display: block; margin-bottom: 20px; filter: drop-shadow(0 0 10px var(--accent-magic)); }

        /* --- Mission Text --- */
        .mission-box { padding: 0 20px; }
        .mission-text { font-size: 1.6rem; line-height: 1.4; font-weight: 300; }
        b { color: var(--accent-magic); font-weight: 600; }

    </style>
</head>
<body>

    <div id="diary-icon" class="diary-trigger" onclick="nav('diary-screen')">📖</div>

    <section id="home" class="screen active">
        <div>
            <h1>SparkPlay</h1>
            <div class="tagline">Avventura Spaziale</div>
        </div>
        <button class="btn-main" onclick="nav('world-select')">Gioca</button>
    </section>

    <section id="diary-screen" class="screen">
        <div class="diary-modal">
            <span class="diary-title">Diario di Bordo</span>
            <div class="diary-row">
                <span class="diary-label">Ultimo Mondo:</span>
                <span id="d-world" class="diary-val">--</span>
            </div>
            <div class="diary-row">
                <span class="diary-label">Ultimo Titolo:</span>
                <span id="d-badge" class="diary-val">--</span>
            </div>
            <div class="diary-row" style="border:none">
                <span class="diary-label">Super Missione:</span>
                <span id="d-super" class="diary-val">--</span>
            </div>
            <button class="btn-secondary" onclick="nav('home')" style="width:100%">Chiudi</button>
        </div>
    </section>

    <section id="world-select" class="screen">
        <h2 style="font-weight:300; margin-bottom:30px">Dove vuoi andare?</h2>
        <div class="world-portal" onclick="startSession('Spazio')">
            <span class="icon-huge">🚀</span>
            <div style="letter-spacing:4px; font-weight:bold">SPAZIO</div>
        </div>
        <button class="btn-secondary" onclick="nav('home')">Indietro</button>
    </section>

    <section id="mission" class="screen">
        <div id="m-progress" style="color:var(--accent-magic); letter-spacing:2px; margin-bottom:20px">MISSIONE 1 DI 3</div>
        <div class="mission-box">
            <span id="m-icon" class="icon-huge">🚀</span>
            <p id="m-text" class="mission-text">...</p>
        </div>
        <button class="btn-main" onclick="handleComplete()">Fatto!</button>
    </section>

    <section id="alert-s" class="screen">
        <span class="icon-huge" style="animation: pulse 1s infinite alternate">🌠</span>
        <h1 style="font-size:2rem">SUPER MISSIONE!</h1>
        <p style="color:var(--accent-gold)">Preparati, astronauta!</p>
    </section>

    <section id="end-screen" class="screen">
        <span class="icon-huge" style="filter: drop-shadow(0 0 20px var(--accent-gold))">🏆</span>
        <h2 style="margin:10px 0">INCREDIBILE!</h2>
        <p style="color:var(--text-soft)">Hai ottenuto il titolo di:</p>
        <div style="color:var(--accent-gold); font-size:1.8rem; font-weight:bold; margin-bottom:40px" id="final-badge">--</div>
        <button class="btn-main" onclick="saveAndHome()">Torna alla Base</button>
    </section>

    <script>
        // MEMORIA RUNTIME
        let diaryData = { world: "--", badge: "--", super: "--" };
        let lastBadgeEarned = "";

        const missions = [
            { t: "Trova un oggetto <b>rosso</b> come Marte! 🔴", i: "☄️" },
            { t: "Fai 5 salti spaziali verso l'alto! ⬆️", i: "👨‍🚀" },
            { t: "Cerca qualcosa di <b>tondo</b> come la Luna! 🌕", i: "🛰️" },
            { t: "Disegna una stella magica nell'aria! ✨", i: "⭐" }
        ];

        const badges = ["Esploratore Spaziale", "Comandante delle Stelle", "Eroe Galattico"];
        const superM = { name: "Base di Cuscini", t: "Costruisci una <b>base spaziale</b> con i cuscini!", i: "🌠" };
        
        let state = { count: 0, pool: [], world: "" };

        function startSession(w) {
            state.world = w;
            state.pool = [...missions].sort(() => 0.5 - Math.random()).slice(0, 3);
            state.count = 0;
            updateUI();
            nav('mission');
        }

        function updateUI() {
            let d = (state.count < 3) ? state.pool[state.count] : superM;
            document.getElementById('m-progress').innerText = (state.count < 3) ? `MISSIONE ${state.count+1} DI 3` : "SFIDA FINALE";
            document.getElementById('m-text').innerHTML = d.t;
            document.getElementById('m-icon').innerText = d.i;
        }

        function handleComplete() {
            state.count++;
            if (state.count === 3) {
                nav('alert-s');
                setTimeout(() => { updateUI(); nav('mission'); }, 2000);
            } else if (state.count > 3) {
                lastBadgeEarned = badges[Math.floor(Math.random() * badges.length)];
                document.getElementById('final-badge').innerText = lastBadgeEarned;
                nav('end-screen');
            } else {
                updateUI();
            }
        }

        function saveAndHome() {
            diaryData.world = state.world;
            diaryData.badge = lastBadgeEarned;
            diaryData.super = superM.name;
            
            document.getElementById('d-world').innerText = diaryData.world;
            document.getElementById('d-badge').innerText = diaryData.badge;
            document.getElementById('d-super').innerText = diaryData.super;
            
            nav('home');
        }

        function nav(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            // Nascondi icona diario se non siamo in home
            document.getElementById('diary-icon').style.display = (id === 'home' || id === 'diary-screen') ? 'flex' : 'none';
        }

        @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.2); } }
    </script>
</body>
</html>
